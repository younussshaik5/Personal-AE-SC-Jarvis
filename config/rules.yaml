approval_mode: true
max_approvals_before_autonomous: 50
triggers:
  - id: persona_yellow_ai
    pattern: (?i)yellow\.ai|conversational ai|bot studio|agent assist
    source: message
    action: switch_persona account_executive
    confidence: 0.8
    priority: 10
  - id: persona_technical
    pattern: >-
      (?i)demo|architecture|integration|api|technical|solution
      consultant|presales
    source: message
    action: switch_persona solution_consultant
    confidence: 0.7
    priority: 9
  - id: detect_competitor
    pattern: >-
      (?i)(zendesk|salesforce|servicenow|hubspot|freshworks|intercom|zoho|ibm
      watson|google dialogflow|microsoft bot framework|uipath|automation
      anywhere)
    source: message
    action: log_competitor_mention
    confidence: 0.9
actions: {}
safety:
  max_updates_per_minute: 10
  cooldown_after_error_seconds: 300
  allowed_paths:
    - MEMORY/**
  forbidden_paths: []

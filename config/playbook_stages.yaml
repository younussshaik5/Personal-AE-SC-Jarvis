# Yellow.ai Sales Playbook Stage Definitions
# Used by PlaybookAutomationEngine

stages:
  new_account:
    name: "New Account"
    order: 1
    description: "Account just created, needs initial research"
    auto_triggers:
      - skill: "competitive_intelligence"
        event: "account.created"
      - skill: "discovery_management"
        event: "account.created"
    exit_criteria:
      - "Company research completed"
      - "ICP match score generated"
      - "Initial competitive landscape mapped"
    stale_days: 5

  discovery:
    name: "Discovery"
    order: 2
    description: "Active discovery phase - understanding customer needs"
    auto_triggers:
      - skill: "meeting_prep"
        event: "meeting.scheduled"
      - skill: "meeting_summary"
        event: "meeting.recording.ready"
      - skill: "meddpicc"
        event: "meeting.summary.ready"
    exit_criteria:
      - "At least 1 discovery meeting completed"
      - "Pain points identified"
      - "Decision process understood"
      - "MEDDPICC score >= 3/8"
    stale_days: 7

  demo:
    name: "Demo / POC"
    order: 3
    description: "Technical validation - demo or proof of concept"
    auto_triggers:
      - skill: "demo_strategy"
        event: "stage.advanced.demo"
      - skill: "battlecards"
        event: "competitor.mentioned"
      - skill: "meeting_summary"
        event: "meeting.recording.ready"
    exit_criteria:
      - "Demo completed with key stakeholders"
      - "Technical requirements validated"
      - "Champion confirmed"
      - "MEDDPICC score >= 5/8"
    stale_days: 10

  proposal:
    name: "Proposal"
    order: 4
    description: "Proposal submitted, awaiting decision"
    auto_triggers:
      - skill: "proposal_generator"
        event: "stage.advanced.proposal"
      - skill: "value_architecture"
        event: "stage.advanced.proposal"
      - skill: "risk_report"
        event: "stage.advanced.proposal"
    exit_criteria:
      - "Proposal delivered to economic buyer"
      - "Pricing discussed"
      - "ROI case presented"
      - "MEDDPICC score >= 6/8"
    stale_days: 7

  negotiation:
    name: "Negotiation"
    order: 5
    description: "Active negotiation on terms and pricing"
    auto_triggers:
      - skill: "followup_email"
        event: "negotiation.update"
      - skill: "risk_report"
        event: "deal.risk.detected"
    exit_criteria:
      - "Terms agreed"
      - "Legal review complete"
      - "Paper process confirmed"
    stale_days: 5

  closed_won:
    name: "Closed Won"
    order: 6
    description: "Deal won - handoff to implementation"
    auto_triggers:
      - skill: "account_dashboard"
        event: "deal.won"
    exit_criteria:
      - "Contract signed"
      - "Implementation kickoff scheduled"

  closed_lost:
    name: "Closed Lost"
    order: 7
    description: "Deal lost - capture learnings"
    auto_triggers:
      - skill: "risk_report"
        event: "deal.lost"

# MEDDPICC scoring weights
meddpicc:
  metrics:
    weight: 1.0
    description: "Quantified business impact and ROI"
  economic_buyer:
    weight: 1.5
    description: "Access to and engagement of economic buyer"
  decision_criteria:
    weight: 1.0
    description: "Understanding of evaluation criteria"
  decision_process:
    weight: 1.5
    description: "Mapped buying process and timeline"
  paper_process:
    weight: 1.0
    description: "Legal, procurement, contract process"
  implicate_pain:
    weight: 1.5
    description: "Business pain clearly articulated and connected to solution"
  champion:
    weight: 2.0
    description: "Internal advocate with power and influence"
  competition:
    weight: 1.0
    description: "Competitive landscape and positioning"

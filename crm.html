<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS — Deal Intelligence</title>
    <style>
        :root {
            --bg:#0f1117; --s1:#1a1d27; --s2:#232736; --bdr:#2d3148;
            --t1:#e4e6f0; --t2:#8b8fa3; --t3:#5d6180;
            --accent:#6c5ce7; --accent2:#a29bfe;
            --g:#00b894; --gbg:rgba(0,184,148,.12);
            --y:#fdcb6e; --ybg:rgba(253,203,110,.12);
            --r:#ff6b6b; --rbg:rgba(255,107,107,.12);
            --b:#74b9ff; --bbg:rgba(116,185,255,.12);
            --rad:14px;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;-webkit-font-smoothing:antialiased}
        .shell{max-width:1200px;margin:0 auto;padding:20px 24px}

        .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 0 20px;border-bottom:1px solid var(--bdr);margin-bottom:24px}
        .topbar h1{font-size:20px;font-weight:700} .topbar h1 span{color:var(--accent2)}
        .topbar-r{font-size:12px;color:var(--t2);display:flex;align-items:center;gap:10px}

        .kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:24px}
        .kpi{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--rad);padding:18px 16px}
        .kpi .kl{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--t2);margin-bottom:6px}
        .kpi .kv{font-size:26px;font-weight:700}
        .kpi .ks{font-size:10px;color:var(--t3);margin-top:4px}
        .green{color:var(--g)}.yellow{color:var(--y)}.red{color:var(--r)}.blue{color:var(--b)}.acc{color:var(--accent2)}

        .funnel{display:flex;gap:8px;margin-bottom:24px}
        .fs{flex:1;min-width:100px;background:var(--s1);border:1px solid var(--bdr);border-radius:var(--rad);padding:14px 8px;text-align:center;position:relative}
        .fs .fn{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--t2);margin-bottom:4px}
        .fs .fc{font-size:24px;font-weight:700;color:var(--accent2)}
        .fs .fv{font-size:10px;color:var(--t2)}
        .fs::after{content:'>';position:absolute;right:-7px;top:50%;transform:translateY(-50%);color:var(--bdr);font-size:16px;font-weight:700;z-index:1}
        .fs:last-child::after{display:none}

        .card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--rad);overflow:hidden;margin-bottom:24px}
        .card-h{padding:16px 20px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center}
        .card-h h2{font-size:14px;font-weight:600}
        table{width:100%;border-collapse:collapse}
        thead th{padding:10px 14px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--t2);border-bottom:1px solid var(--bdr);background:var(--s2);font-weight:600}
        tbody td{padding:11px 14px;border-bottom:1px solid var(--bdr);font-size:12px}
        tbody tr{cursor:pointer;transition:background .12s}
        tbody tr:hover{background:var(--s2)}
        .an{font-weight:600;color:var(--accent2)}
        .asub{font-size:11px;color:var(--t2);padding-left:16px}.asub::before{content:'L '}
        .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600}
        .b-neg{background:var(--gbg);color:var(--g)}.b-qual{background:var(--ybg);color:var(--y)}.b-disc{background:var(--bbg);color:var(--b)}.b-demo{background:rgba(108,92,231,.15);color:var(--accent2)}.b-init{background:rgba(139,143,163,.1);color:var(--t2)}.b-won{background:var(--gbg);color:var(--g)}.b-lost{background:var(--rbg);color:var(--r)}
        .mb{width:50px;height:5px;background:var(--s2);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:5px}
        .mf{height:100%;border-radius:3px}
        .rd{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:3px}
        .rd.h{background:var(--r)}.rd.m{background:var(--y)}.rd.l{background:var(--g)}
        .skill-count{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;background:rgba(108,92,231,.15);color:var(--accent2)}

        .detail{display:none}.detail.on{display:block}
        .dash.off{display:none}
        .back{display:inline-flex;align-items:center;gap:5px;color:var(--t2);font-size:12px;cursor:pointer;margin-bottom:16px;padding:7px 12px;border-radius:8px;transition:all .12s;border:none;background:none}
        .back:hover{background:var(--s1);color:var(--t1)}

        /* ── VP Executive Hero ───────────────────────────────── */
        .vp-hero{background:linear-gradient(135deg,rgba(108,92,231,.08) 0%,var(--s1) 100%);border:1px solid var(--bdr);border-radius:var(--rad);padding:28px;margin-bottom:20px}
        .vp-hero-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;gap:16px}
        .vp-hero-title h2{font-size:30px;font-weight:800;margin-bottom:4px;letter-spacing:-.3px}
        .vp-hero-title .sub{font-size:12px;color:var(--t2)}
        .vp-hero-actions{display:flex;gap:8px;flex-shrink:0}
        .btn-primary{padding:9px 20px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
        .btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
        .btn-sec{padding:9px 16px;background:var(--s2);color:var(--t1);border:1px solid var(--bdr);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
        .btn-sec:hover{border-color:var(--accent2);color:var(--accent2)}

        .vp-kpis{display:grid;grid-template-columns:repeat(7,1fr);gap:12px}
        .vk{background:var(--s2);border-radius:10px;padding:14px;text-align:center}
        .vk .vkl{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--t2);margin-bottom:5px}
        .vk .vkv{font-size:22px;font-weight:700}
        .vk .vks{font-size:10px;color:var(--t3);margin-top:2px}

        /* Deal health pill */
        .health-pill{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:24px;font-size:13px;font-weight:700;margin-left:12px}
        .health-pill.green{background:var(--gbg);color:var(--g);border:1px solid rgba(0,184,148,.25)}
        .health-pill.yellow{background:var(--ybg);color:var(--y);border:1px solid rgba(253,203,110,.25)}
        .health-pill.red{background:var(--rbg);color:var(--r);border:1px solid rgba(255,107,107,.25)}
        .health-dot{width:8px;height:8px;border-radius:50%}
        .health-dot.green{background:var(--g)}.health-dot.yellow{background:var(--y)}.health-dot.red{background:var(--r)}

        /* ── Section layout ──────────────────────────────────── */
        .section{margin-bottom:24px}
        .section-label{font-size:10px;text-transform:uppercase;letter-spacing:1.4px;color:var(--t3);margin-bottom:10px;padding-left:2px;font-weight:700}
        .sec{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--rad);overflow:hidden}
        .sec-h{padding:14px 20px;border-bottom:1px solid var(--bdr);font-size:13px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
        .sec-b{padding:18px 20px;font-size:13px;line-height:1.7}

        .cols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
        .cols3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}

        /* ── MEDDPICC grid ───────────────────────────────────── */
        .mg{display:grid;grid-template-columns:1fr 1fr;gap:6px}
        .mi{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--s2);border-radius:8px}
        .mi .ml{font-size:11px;color:var(--t2);min-width:128px}
        .mi .mbar{flex:1;height:9px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden}
        .mi .mfl{height:100%;border-radius:4px;transition:width .4s}
        .mi .ms{font-size:11px;font-weight:700;min-width:30px;text-align:right}
        .mi .mrank{font-size:9px;font-weight:700;text-transform:uppercase;min-width:40px;text-align:right;letter-spacing:.3px}

        /* ── Risk items ──────────────────────────────────────── */
        .ri{display:flex;gap:10px;padding:10px 12px;border-radius:8px;margin-bottom:6px;font-size:12px;align-items:flex-start}
        .ri.high{background:var(--rbg)}.ri.medium{background:var(--ybg)}.ri.low{background:var(--gbg)}
        .rb{font-size:9px;font-weight:700;text-transform:uppercase;padding:2px 8px;border-radius:4px;white-space:nowrap}
        .rb.high{background:var(--r);color:#fff}.rb.medium{background:var(--y);color:#111}.rb.low{background:var(--g);color:#fff}

        /* ── Stakeholder cards ───────────────────────────────── */
        .smap{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
        .scard{background:var(--s2);border:1px solid var(--bdr);border-radius:10px;padding:14px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:5px;position:relative}
        .scard.champion{border-color:rgba(0,184,148,.4)}
        .scard.blocker{border-color:rgba(255,107,107,.3)}
        .scard.economic{border-color:rgba(253,203,110,.4)}
        .sav{width:40px;height:40px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
        .sav.champion{background:var(--g)}.sav.blocker{background:var(--r)}.sav.economic{background:var(--y);color:#111}
        .sn{font-weight:600;font-size:12px;line-height:1.3}
        .sr{font-size:10px;color:var(--t2)}
        .srole{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 8px;border-radius:10px;margin-top:2px}
        .srole.champion{background:var(--gbg);color:var(--g)}.srole.blocker{background:var(--rbg);color:var(--r)}.srole.economic{background:var(--ybg);color:var(--y)}.srole.default{background:rgba(108,92,231,.15);color:var(--accent2)}
        .champ-star{position:absolute;top:6px;right:8px;font-size:14px}

        /* ── Activity / action items ─────────────────────────── */
        .ai{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--bdr);font-size:12px}
        .ai:last-child{border-bottom:none}
        .anum{min-width:22px;height:22px;background:var(--accent);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
        .anum.red{background:var(--r)}.anum.yellow{background:var(--y);color:#111}.anum.green{background:var(--g)}

        /* ── Progress stages ─────────────────────────────────── */
        .prog{display:flex;margin:10px 0 4px}
        .ps{flex:1;text-align:center;position:relative;padding:8px 2px}
        .pd{width:14px;height:14px;border-radius:50%;margin:0 auto 5px;border:2px solid var(--bdr)}
        .pd.completed{background:var(--g);border-color:var(--g)}.pd.current{background:var(--accent);border-color:var(--accent);box-shadow:0 0 0 4px rgba(108,92,231,.2)}.pd.pending{background:transparent}
        .pl{font-size:9px;color:var(--t2)}.ps.completed .pl{color:var(--g)}.ps.current .pl{color:var(--accent2);font-weight:600}
        .pline{position:absolute;top:14px;left:50%;right:-50%;height:2px;background:var(--bdr);z-index:0}
        .ps:last-child .pline{display:none}.ps.completed .pline{background:var(--g)}

        /* ── Metrics grid (2×2 or 2×3) ─────────────────────── */
        .cg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
        .cg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
        .ci{padding:12px;background:var(--s2);border-radius:8px}
        .ci .cl{font-size:9px;text-transform:uppercase;color:var(--t2);letter-spacing:.5px;margin-bottom:3px}
        .ci .cv{font-size:14px;font-weight:700}

        /* ── Discovery bar ───────────────────────────────────── */
        .dp{display:flex;gap:5px;margin-bottom:8px}
        .ds{flex:1;height:8px;border-radius:4px;background:var(--s2)}.ds.ok{background:var(--g)}

        /* ── Health gauge strip ──────────────────────────────── */
        .hstrip{display:flex;gap:14px;margin-top:16px}
        .hg{flex:1;background:var(--s2);border-radius:8px;padding:12px 14px}
        .hg .hgl{font-size:9px;text-transform:uppercase;color:var(--t2);letter-spacing:.5px;margin-bottom:6px}
        .hg .hgbar{height:8px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden;margin-bottom:4px}
        .hg .hgf{height:100%;border-radius:4px;transition:width .4s}
        .hg .hgv{font-size:13px;font-weight:700}

        /* ── Competitive position ────────────────────────────── */
        .comp-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}

        /* ── Value / ROI ─────────────────────────────────────── */
        .value-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
        .vs-item{background:var(--s2);border-radius:8px;padding:14px}
        .vs-item .vsl{font-size:9px;text-transform:uppercase;color:var(--t2);letter-spacing:.5px;margin-bottom:3px}
        .vs-item .vsv{font-size:15px;font-weight:700}

        /* ── Skill outputs ───────────────────────────────────── */
        .skill-md{white-space:pre-wrap;font-size:12px;line-height:1.85;color:var(--t2)}
        .md-body{white-space:normal}
        .md-body h1,.md-body h2,.md-body h3,.md-body h4{color:var(--t1);font-weight:600;margin:12px 0 6px}
        .md-body h1{font-size:15px}.md-body h2{font-size:14px;border-bottom:1px solid var(--bdr);padding-bottom:4px}.md-body h3{font-size:13px}.md-body h4{font-size:12px;color:var(--t2)}
        .md-body p{margin:4px 0 8px;color:var(--t2)}
        .md-body ul,.md-body ol{margin:4px 0 8px;padding-left:18px;color:var(--t2)}
        .md-body li{margin:2px 0}
        .md-body strong{color:var(--t1);font-weight:600}
        .md-body em{color:var(--accent2);font-style:italic}
        .md-body code{background:var(--s1);color:var(--accent2);padding:1px 5px;border-radius:4px;font-family:monospace;font-size:11px}
        .md-body pre{background:var(--s1);border:1px solid var(--bdr);border-radius:6px;padding:10px;overflow-x:auto;margin:8px 0}
        .md-body pre code{background:none;padding:0;color:var(--t1)}
        .md-body table{width:100%;border-collapse:collapse;margin:8px 0;font-size:11px}
        .md-body th{background:var(--s1);color:var(--t1);font-weight:600;padding:6px 10px;text-align:left;border:1px solid var(--bdr)}
        .md-body td{padding:5px 10px;border:1px solid var(--bdr);color:var(--t2);vertical-align:top}
        .md-body tr:nth-child(even) td{background:rgba(255,255,255,.02)}
        .md-body blockquote{border-left:3px solid var(--accent);margin:6px 0;padding:4px 12px;color:var(--t3);font-style:italic}
        .md-body hr{border:none;border-top:1px solid var(--bdr);margin:10px 0}
        .skill-empty{text-align:center;padding:20px 12px}
        .skill-empty .se-title{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:4px}
        .skill-empty .se-desc{font-size:11px;color:var(--t2);margin-bottom:10px}
        .se-cmd{font-family:'SF Mono',Consolas,monospace;font-size:11px;padding:8px 14px;background:var(--s2);border-radius:8px;color:var(--accent2);display:inline-block;cursor:pointer;border:1px solid var(--bdr);transition:all .15s}
        .se-cmd:hover{border-color:var(--accent);background:rgba(108,92,231,.1)}
        .jarvis-tag{font-size:9px;font-weight:600;color:var(--g);text-transform:uppercase;letter-spacing:.5px}

        .divider{border:none;border-top:1px solid var(--bdr);margin:28px 0 20px}
        .loading{text-align:center;padding:60px;color:var(--t2);font-size:15px}
        .empty{color:var(--t2);font-size:11px;font-style:italic}

        .q-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:10px;font-weight:600;background:rgba(108,92,231,.15);color:var(--accent2);border:1px solid rgba(108,92,231,.3);cursor:default}
        .q-badge.active{background:rgba(253,203,110,.12);color:var(--y);border-color:rgba(253,203,110,.3);animation:pulse 2s infinite}
        .q-badge.done{background:var(--gbg);color:var(--g);border-color:rgba(0,184,148,.3)}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
        .gen-all{padding:6px 14px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
        .gen-all:hover{background:var(--accent2)}

        /* ── Print / VP share styles ─────────────────────────── */
        .ph,.pf{display:none}
        @media print{
            body{background:#fff!important;color:#111!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
            .topbar,.back,.vp-hero-actions,.dash,.funnel,.skill-empty,.se-cmd,.gen-all,.q-badge{display:none!important}
            .detail.on{display:block!important}
            .shell{max-width:100%;padding:10px}
            .vp-hero,.sec,.card,.scard,.ci{border:1px solid #ddd!important;background:#fff!important;box-shadow:none!important;break-inside:avoid}
            :root{--t1:#111;--t2:#555;--s1:#fff;--s2:#f5f5f5;--bdr:#ddd;--accent:#4a3fbf;--accent2:#5f4fcf;--g:#00875a;--r:#c0392b;--y:#b8860b}
            .ph{display:block!important;text-align:center;padding:14px 0 8px;border-bottom:2px solid #111;margin-bottom:14px}
            .ph h1{font-size:20px}.ph p{font-size:10px;color:#555}
            .pf{display:block!important;text-align:center;margin-top:20px;padding-top:8px;border-top:1px solid #ddd;font-size:9px;color:#999}
            .section{break-inside:avoid}
            .vp-kpis{grid-template-columns:repeat(4,1fr)!important}
            .smap{grid-template-columns:repeat(4,1fr)!important}
        }
        @media(max-width:1000px){.kpis{grid-template-columns:repeat(3,1fr)}.cols{grid-template-columns:1fr}.vp-kpis{grid-template-columns:repeat(3,1fr)}}
        @media(max-width:600px){.kpis{grid-template-columns:repeat(2,1fr)}.vp-kpis{grid-template-columns:repeat(2,1fr)}}
    </style>
</head>
<body>
<div class="shell">
    <div class="ph"><h1>JARVIS Deal Intelligence — VP Report</h1><p id="printDate"></p></div>
    <div class="topbar">
        <h1><span>JARVIS</span> Deal Intelligence</h1>
        <div class="topbar-r">
            <span id="qBadge" style="display:none" class="q-badge"></span>
            <button class="gen-all" onclick="generateAll()">Generate All Intelligence</button>
            <span id="lastRefresh"></span>
        </div>
    </div>
    <div id="loading" class="loading">Loading deal intelligence...</div>

    <!-- DASHBOARD -->
    <div id="dash" class="dash off">
        <div class="kpis" id="kpis"></div>
        <div class="funnel" id="funnel"></div>
        <div class="card">
            <div class="card-h"><h2>Pipeline</h2><span id="acntCnt" style="font-size:11px;color:var(--t2)"></span></div>
            <table><thead><tr><th>Account</th><th>Stage</th><th>Deal</th><th>Prob</th><th>MEDDPICC</th><th>Risks</th><th>Skills</th><th>Timeline</th><th>Updated</th></tr></thead><tbody id="tbl"></tbody></table>
        </div>
    </div>

    <!-- DETAIL (VP Account View) -->
    <div id="detail" class="detail">
        <button class="back" onclick="goBack()">← Back to Pipeline</button>
        <div id="detailContent"></div>
    </div>
    <div class="pf">Generated by JARVIS Deal Intelligence · Confidential</div>
</div>

<script>
// Inline markdown → HTML renderer (no CDN dependency)
function mdToHtml(src){
    if(!src)return'';
    function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
    function inl(t){
        t=esc(t);
        t=t.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
        t=t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
        t=t.replace(/\*([^*\n]+?)\*/g,'<em>$1</em>');
        t=t.replace(/`([^`\n]+)`/g,'<code>$1</code>');
        return t;
    }
    var lines=src.split('\n'),out=[],inUl=false,inOl=false,inTbl=false,tblRows=[],m;
    function flushTbl(){if(!tblRows.length)return;var h='<table>',isHdr=true;tblRows.forEach(function(r){if(/^[\s\-:|]+$/.test(r.replace(/\|/g,''))){isHdr=false;return;}var tag=isHdr?'th':'td',cells=r.replace(/^\||\|$/g,'').split('|');h+='<tr>'+cells.map(function(c){return'<'+tag+'>'+inl(c.trim())+'</'+tag+'>'}).join('')+'</tr>';if(isHdr)isHdr=false;});out.push(h+'</table>');tblRows=[];inTbl=false;}
    function flushUl(){if(inUl){out.push('</ul>');inUl=false;}}
    function flushOl(){if(inOl){out.push('</ol>');inOl=false;}}
    lines.forEach(function(line){
        if(/^\|/.test(line)){flushUl();flushOl();inTbl=true;tblRows.push(line.trim());return;}
        if(inTbl)flushTbl();
        if((m=line.match(/^(#{1,6}) (.+)$/))){flushUl();flushOl();out.push('<h'+m[1].length+'>'+inl(m[2])+'</h'+m[1].length+'>');return;}
        if(/^-{3,}\s*$/.test(line)){flushUl();flushOl();out.push('<hr>');return;}
        if((m=line.match(/^[*\-] (.+)/))){flushOl();if(!inUl){out.push('<ul>');inUl=true;}out.push('<li>'+inl(m[1])+'</li>');return;}
        if((m=line.match(/^\d+\. (.+)/))){flushUl();if(!inOl){out.push('<ol>');inOl=true;}out.push('<li>'+inl(m[1])+'</li>');return;}
        flushUl();flushOl();
        if(line.trim()===''){out.push('<br>');return;}
        out.push('<p>'+inl(line)+'</p>');
    });
    flushUl();flushOl();if(inTbl)flushTbl();
    return out.join('');
}

function updateQBadge(){

function startQueuePoll(){
    if(_qPoll)return;
    _qPoll=setInterval(async function(){
        try{
            var r=await fetch('/api/queue');Q=await r.json();
            updateQBadge();
            if(!Q.is_active){
                clearInterval(_qPoll);_qPoll=null;
                var r2=await fetch('/api/accounts');D=await r2.json();REG=D.skill_registry||{};

async function generateAll(){
    try{

const fmt$=n=>n>=1e6?'$'+(n/1e6).toFixed(1)+'M':n>=1e3?'$'+(n/1e3).toFixed(0)+'K':'$'+n;
const fmtP=n=>Math.round(n*100)+'%';
function bc(s){const l=(s||'').toLowerCase();if(l.includes('won'))return'b-won';if(l.includes('lost'))return'b-lost';return l.includes('negot')||l.includes('close')?'b-neg':l.includes('qual')?'b-qual':l.includes('disc')?'b-disc':l.includes('demo')?'b-demo':'b-init'}
function mc(p){return p>=70?'var(--g)':p>=40?'var(--y)':'var(--r)'}
function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// Compute composite deal health score (0–100)
function dealHealth(a){
    var mp=a.meddpicc.percentage||0;
    var dc=a.discovery_completeness.percentage||0;
    var hr=a.risks.filter(function(r){return r.level==='high'}).length;
    var mr=a.risks.filter(function(r){return r.level==='medium'}).length;
    var riskScore=Math.max(0,100-(hr*20+mr*8));
    var prob=Math.round((a.probability||0)*100);
    var h=Math.round(mp*0.35+dc*0.25+riskScore*0.25+prob*0.15);
    return{score:h,label:h>=70?'Healthy':h>=45?'At Risk':'Critical',cls:h>=70?'green':h>=45?'yellow':'red'};
}

// Parse role string to detect champion / economic buyer / blocker
function parseRole(roleStr){
    var r=(roleStr||'').toLowerCase();
    if(r.includes('champion'))return'champion';
    if(r.includes('economic')||r.includes('cfo')||r.includes('ceo')||r.includes('vp')||r.includes('budget'))return'economic';
    if(r.includes('block')||r.includes('oppos')||r.includes('detract'))return'blocker';
    return'default';
}

    h+='<div class="ci"><div class="cl">Status</div><div class="cv">'+(esc(comp.competitor_status)||'Unknown')+'</div></div>';
    h+='<div class="ci"><div class="cl">Our Pricing</div><div class="cv">'+(esc(comp.our_price)||'TBD')+'</div></div>';
    h+='<div class="ci"><div class="cl">Win vs Competitor</div><div class="cv" style="color:'+((comp.win_probability_vs_competitor||0)>=.5?'var(--g)':'var(--r)')+'">'+(comp.win_probability_vs_competitor?fmtP(comp.win_probability_vs_competitor):'TBD')+'</div></div>';
    h+='</div>';
    h+=skillBlock('competitive_intelligence',a,'JARVIS Competitive Intel');
    h+='</div></div>';

    // Battlecard
    h+='<div class="sec"><div class="sec-h">Battlecard</div><div class="sec-b">';
    h+=skillBlock('battlecard',a,'JARVIS Battlecard',true);
    h+='</div></div>';
    h+='</div>'; // end cols

    // Pricing analysis (full width)
    if(a.skill_outputs['competitor_pricing']){
        h+='<div class="sec" style="margin-top:14px"><div class="sec-h">Pricing Analysis <span class="jarvis-tag" style="margin-left:8px">AI Generated</span></div><div class="sec-b"><div class="skill-md md-body">'+mdToHtml(a.skill_outputs['competitor_pricing'])+'</div></div></div>';
    }
    h+='</div>';

    // ── DISCOVERY & COMPANY RESEARCH ───────────────────────────────────────────
    h+='<div class="section"><div class="section-label">Discovery & Research</div><div class="cols">';

    h+='<div class="sec"><div class="sec-h">Discovery Completeness <span style="font-weight:400;color:'+(dc.percentage>=70?'var(--g)':dc.percentage>=40?'var(--y)':'var(--r)')+'">'+dc.percentage+'%</span></div><div class="sec-b">';
    h+='<div class="dp">'+Array.from({length:dc.total},function(_,i){return'<div class="ds '+(i<dc.completed?'ok':'')+'"></div>'}).join('')+'</div>';
    h+='<div style="font-size:11px;color:var(--t2);margin-bottom:10px">'+dc.completed+'/'+dc.total+' areas covered</div>';
    if(dc.missing&&dc.missing.length){
        h+='<div style="margin-bottom:10px"><div style="font-size:10px;color:var(--r);text-transform:uppercase;font-weight:600;margin-bottom:4px">Missing</div>';
        h+=dc.missing.map(function(m){return'<div style="padding:2px 0;font-size:11px;color:var(--y)">&cir; '+esc(m)+'</div>'}).join('');
        h+='</div>';
    }
    if(a.skill_outputs['discovery_questions']){
        h+='<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--bdr)"><span class="jarvis-tag">Discovery Questions</span><div class="skill-md md-body" style="margin-top:6px">'+mdToHtml(a.skill_outputs['discovery_questions'])+'</div></div>';
    } else if(a.discovery_notes){
        h+='<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--bdr)"><div style="font-size:10px;color:var(--t2);text-transform:uppercase;font-weight:600;margin-bottom:6px">Discovery Notes</div><div class="skill-md md-body">'+mdToHtml(a.discovery_notes)+'</div></div>';
    }
    h+='</div></div>';

    h+='<div class="sec"><div class="sec-h">Company Research</div><div class="sec-b"><div class="skill-md md-body">'+mdToHtml(a.company_info||'No company research generated yet.')+'</div></div></div>';
    h+='</div></div>';

    // ── RISK ANALYSIS ──────────────────────────────────────────────────────────
    h+='<div class="section"><div class="section-label">Risk Analysis</div>';
    h+='<div class="sec"><div class="sec-h">Deal Risks <span style="color:'+(hrCnt?'var(--r)':'var(--g)')+'">'+a.risks.length+' identified'+(hrCnt?' &bull; '+hrCnt+' HIGH':'')+'</span></div><div class="sec-b">';
    if(a.risks.length){
        h+=a.risks.map(function(r){return'<div class="ri '+r.level+'"><span class="rb '+r.level+'">'+esc(r.level)+'</span><div><strong>'+esc(r.cat)+'</strong> &mdash; '+esc(r.text)+'</div></div>'}).join('');
    } else {
        h+='<div style="color:var(--g);font-size:12px;padding:8px 0">No significant risks identified</div>';
    }
    h+=skillBlock('risk_report',a,'JARVIS AI Risk Report');
    h+=skillBlock('technical_risk',a,'JARVIS Technical Risk');
    h+='</div></div></div>';

    // ── NEXT ACTIONS & RECENT ACTIVITIES ──────────────────────────────────────
    h+='<div class="section"><div class="section-label">Actions & Activities</div><div class="cols">';

    h+='<div class="sec"><div class="sec-h">Next Actions <span style="color:var(--t2);font-weight:400;font-size:12px">'+a.next_actions.length+'</span></div><div class="sec-b">';
    if(a.next_actions.length){
        h+=a.next_actions.map(function(x,i){
            var num=i+1,cls=num<=2?'red':num<=4?'yellow':'green';
            return'<div class="ai"><div class="anum '+cls+'">'+num+'</div><div>'+esc(x)+'</div></div>';
        }).join('');
    } else {
        h+='<div class="empty">No actions defined — populate CLAUDE.md or account_summary</div>';
    }
    // Meeting prep
    if(a.skill_outputs['meeting_prep']){
        h+='<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--bdr)"><span class="jarvis-tag">Meeting Prep</span><div class="skill-md md-body" style="margin-top:6px">'+mdToHtml(a.skill_outputs['meeting_prep'])+'</div></div>';
    }
    h+='</div></div>';

    h+='<div class="sec"><div class="sec-h">Recent Activities <span style="color:var(--t2);font-weight:400;font-size:12px">'+a.activities.length+'</span></div><div class="sec-b">';
    if(a.activities.length){
        h+=a.activities.map(function(x){return'<div style="padding:7px 0;border-bottom:1px solid var(--bdr);display:flex;gap:8px;font-size:12px"><span style="color:var(--g)">✓</span><div>'+esc(x)+'</div></div>'}).join('');
    } else {
        h+='<div class="empty">No activities recorded</div>';
    }
    h+='</div></div>';
    h+='</div></div>';

    // ── ACCOUNT SUMMARY (AI) ───────────────────────────────────────────────────
    if(a.skill_outputs['account_summary']||a.skill_outputs['quick_insights']){
        h+='<div class="section"><div class="section-label">AI Deal Summary</div><div class="cols">';
        if(a.skill_outputs['account_summary']){
            h+='<div class="sec"><div class="sec-h">Account Summary <span class="jarvis-tag" style="margin-left:8px">AI Generated</span></div><div class="sec-b"><div class="skill-md md-body">'+mdToHtml(a.skill_outputs['account_summary'])+'</div></div></div>';
        }
        if(a.skill_outputs['quick_insights']){
            h+='<div class="sec"><div class="sec-h">Quick Insights <span class="jarvis-tag" style="margin-left:8px">AI Generated</span></div><div class="sec-b"><div class="skill-md md-body">'+mdToHtml(a.skill_outputs['quick_insights'])+'</div></div></div>';
        }
        h+='</div></div>';
    }

    // ── REMAINING JARVIS INTELLIGENCE ─────────────────────────────────────────
    var alreadyShown=new Set(['meddpicc','risk_report','technical_risk','competitive_intelligence','battlecard','competitor_pricing','value_architecture','discovery_questions','meeting_prep','account_summary','quick_insights']);
    var skillOrder=['demo_strategy','proposal','followup_email','sow','documentation','architecture_diagram','knowledge_builder','conversation_summary','custom_template'];
    var generated=skillOrder.filter(function(k){return a.skill_outputs[k]&&!alreadyShown.has(k)});
    var allPending=['account_summary','quick_insights','discovery_questions','value_architecture','competitor_pricing','meeting_prep','demo_strategy','proposal','followup_email','technical_risk','sow','meddpicc','risk_report','battlecard','competitive_intelligence'];
    var pending=allPending.filter(function(k){return!a.skill_outputs[k]});

    if(generated.length){
        h+='<hr class="divider"><div class="section"><div class="section-label">More JARVIS Intelligence ('+generated.length+')</div>';
        generated.forEach(function(k){var info=REG[k]||{label:k};h+='<div class="sec" style="margin-bottom:14px"><div class="sec-h">'+esc(info.label)+' <span class="jarvis-tag">Generated by JARVIS</span></div><div class="sec-b"><div class="skill-md md-body">'+mdToHtml(a.skill_outputs[k])+'</div></div></div>'});
        h+='</div>';
    }

    if(pending.length){
        var queued=a.skills_queued||[],isActive=Q&&Q.is_active;
        h+='<hr class="divider"><div class="section"><div class="section-label">Intelligence Generating ('+pending.length+' pending)</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">';
        pending.forEach(function(k){
            var info=REG[k]||{label:k,cmd:k};
            var inQ=queued.indexOf(k)>=0||isActive;
            if(inQ){
                h+='<div class="sec"><div class="sec-b"><div class="skill-empty"><div class="se-title">'+esc(info.label)+'</div><div style="margin:10px 0;color:var(--y);font-size:12px;font-weight:600">⏳ Generating…</div><div style="font-size:10px;color:var(--t3)">Refreshes automatically when ready</div></div></div></div>';
            } else {
                h+='<div class="sec"><div class="sec-b"><div class="skill-empty"><div class="se-title">'+esc(info.label)+'</div><div style="font-size:10px;color:var(--t3);margin-bottom:8px">Will auto-generate when JARVIS is active</div><div class="se-cmd" onclick="copyCmd(this)" title="Click to copy">Run '+esc(info.cmd)+' for '+esc(a.name)+'</div></div></div></div>';
            }
        });
        h+='</div></div>';
    }

    document.getElementById('detailContent').innerHTML=h;
}

function skillBlock(key,a,title,standalone){
    var content=a.skill_outputs[key];
    if(content)return'<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--bdr)"><span class="jarvis-tag">'+esc(title)+'</span><div class="skill-md md-body" style="margin-top:6px">'+mdToHtml(content)+'</div></div>';
    if(standalone){var info=REG[key]||{cmd:key};return'<div class="skill-empty"><div class="se-title">Not Generated Yet</div><div class="se-desc">Ask JARVIS:</div><div class="se-cmd" onclick="copyCmd(this)">"Run '+esc(info.cmd)+' for '+esc((cur||{}).name||'')+'"</div></div>'}
    return'';
}

function goBack(){document.getElementById('dash').classList.remove('off');document.getElementById('detail').classList.remove('on');cur=null}
function exportPDF(){if(!cur)return;document.getElementById('printDate').textContent=cur.name+' \u2014 '+new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});window.print()}
function copyCmd(el){navigator.clipboard.writeText(el.textContent.trim());var o=el.textContent;el.textContent='Copied!';el.style.color='var(--g)';setTimeout(function(){el.textContent=o;el.style.color=''},1200)}
window.addEventListener('load',init);
</script>
</body>
</html>

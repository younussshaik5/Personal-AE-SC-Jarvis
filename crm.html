<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS — Deal Intelligence</title>
    <style>
        :root {
            --bg:#0f1117; --s1:#1a1d27; --s2:#232736; --bdr:#2d3148;
            --t1:#e4e6f0; --t2:#8b8fa3; --t3:#5d6180;
            --accent:#6c5ce7; --accent2:#a29bfe;
            --g:#00b894; --gbg:rgba(0,184,148,.12);
            --y:#fdcb6e; --ybg:rgba(253,203,110,.12);
            --r:#ff6b6b; --rbg:rgba(255,107,107,.12);
            --b:#74b9ff; --bbg:rgba(116,185,255,.12);
            --rad:14px;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;-webkit-font-smoothing:antialiased}
        .shell{max-width:1100px;margin:0 auto;padding:20px 24px}

        .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 0 20px;border-bottom:1px solid var(--bdr);margin-bottom:24px}
        .topbar h1{font-size:20px;font-weight:700} .topbar h1 span{color:var(--accent2)}
        .topbar-r{font-size:12px;color:var(--t2)}

        .kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:24px}
        .kpi{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--rad);padding:18px 16px}
        .kpi .kl{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--t2);margin-bottom:6px}
        .kpi .kv{font-size:26px;font-weight:700}
        .kpi .ks{font-size:10px;color:var(--t3);margin-top:4px}
        .green{color:var(--g)}.yellow{color:var(--y)}.red{color:var(--r)}.blue{color:var(--b)}.acc{color:var(--accent2)}

        .funnel{display:flex;gap:8px;margin-bottom:24px}
        .fs{flex:1;min-width:100px;background:var(--s1);border:1px solid var(--bdr);border-radius:var(--rad);padding:14px 8px;text-align:center;position:relative}
        .fs .fn{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--t2);margin-bottom:4px}
        .fs .fc{font-size:24px;font-weight:700;color:var(--accent2)}
        .fs .fv{font-size:10px;color:var(--t2)}
        .fs::after{content:'>';position:absolute;right:-7px;top:50%;transform:translateY(-50%);color:var(--bdr);font-size:16px;font-weight:700;z-index:1}
        .fs:last-child::after{display:none}

        .card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--rad);overflow:hidden;margin-bottom:24px}
        .card-h{padding:16px 20px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center}
        .card-h h2{font-size:14px;font-weight:600}
        table{width:100%;border-collapse:collapse}
        thead th{padding:10px 14px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--t2);border-bottom:1px solid var(--bdr);background:var(--s2);font-weight:600}
        tbody td{padding:11px 14px;border-bottom:1px solid var(--bdr);font-size:12px}
        tbody tr{cursor:pointer;transition:background .12s}
        tbody tr:hover{background:var(--s2)}
        .an{font-weight:600;color:var(--accent2)}
        .asub{font-size:11px;color:var(--t2);padding-left:16px}.asub::before{content:'L '}
        .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600}
        .b-neg{background:var(--gbg);color:var(--g)}.b-qual{background:var(--ybg);color:var(--y)}.b-disc{background:var(--bbg);color:var(--b)}.b-demo{background:rgba(108,92,231,.15);color:var(--accent2)}.b-init{background:rgba(139,143,163,.1);color:var(--t2)}.b-won{background:var(--gbg);color:var(--g)}.b-lost{background:var(--rbg);color:var(--r)}
        .mb{width:50px;height:5px;background:var(--s2);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:5px}
        .mf{height:100%;border-radius:3px}
        .rd{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:3px}
        .rd.h{background:var(--r)}.rd.m{background:var(--y)}.rd.l{background:var(--g)}
        .skill-count{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;background:rgba(108,92,231,.15);color:var(--accent2)}

        .detail{display:none}.detail.on{display:block}
        .dash.off{display:none}
        .back{display:inline-flex;align-items:center;gap:5px;color:var(--t2);font-size:12px;cursor:pointer;margin-bottom:16px;padding:7px 12px;border-radius:8px;transition:all .12s;border:none;background:none}
        .back:hover{background:var(--s1);color:var(--t1)}

        .hero{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--rad);padding:28px;margin-bottom:28px}
        .hero-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
        .hero h2{font-size:28px;font-weight:700;margin-bottom:2px}
        .hero .par{font-size:11px;color:var(--t2)}
        .hero-kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:16px}
        .hk{text-align:center}.hk .hl{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--t2);margin-bottom:3px}.hk .hv{font-size:22px;font-weight:700}
        .btn-exp{padding:10px 22px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
        .btn-exp:hover{background:var(--accent2);transform:translateY(-1px)}

        .section{margin-bottom:28px}
        .section-label{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--t3);margin-bottom:12px;padding-left:2px;font-weight:600}
        .sec{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--rad);overflow:hidden}
        .sec-h{padding:16px 20px;border-bottom:1px solid var(--bdr);font-size:13px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
        .sec-b{padding:20px;font-size:13px;line-height:1.7}

        .cols{display:grid;grid-template-columns:1fr 1fr;gap:16px}

        .mg{display:grid;grid-template-columns:1fr 1fr;gap:7px}
        .mi{display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--s2);border-radius:8px}
        .mi .ml{font-size:11px;color:var(--t2);min-width:118px}
        .mi .mbar{flex:1;height:8px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden}
        .mi .mfl{height:100%;border-radius:4px;transition:width .4s}
        .mi .ms{font-size:11px;font-weight:600;min-width:30px;text-align:right}

        .ri{display:flex;gap:10px;padding:10px 12px;border-radius:8px;margin-bottom:6px;font-size:12px;align-items:flex-start}
        .ri.high{background:var(--rbg)}.ri.medium{background:var(--ybg)}.ri.low{background:var(--gbg)}
        .rb{font-size:9px;font-weight:700;text-transform:uppercase;padding:2px 8px;border-radius:4px;white-space:nowrap}
        .rb.high{background:var(--r);color:#fff}.rb.medium{background:var(--y);color:#111}.rb.low{background:var(--g);color:#fff}

        .si{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--bdr)}
        .si:last-child{border-bottom:none}
        .sav{width:36px;height:36px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
        .sn{font-weight:600;font-size:13px}.sr{font-size:11px;color:var(--t2)}

        .dp{display:flex;gap:5px;margin-bottom:10px}
        .ds{flex:1;height:8px;border-radius:4px;background:var(--s2)}.ds.ok{background:var(--g)}

        .ai{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--bdr);font-size:13px}
        .ai:last-child{border-bottom:none}
        .anum{min-width:24px;height:24px;background:var(--accent);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}

        .cg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .ci{padding:12px;background:var(--s2);border-radius:8px}
        .ci .cl{font-size:9px;text-transform:uppercase;color:var(--t2);letter-spacing:.5px;margin-bottom:3px}
        .ci .cv{font-size:14px;font-weight:600}

        .prog{display:flex;margin:8px 0}
        .ps{flex:1;text-align:center;position:relative;padding:8px 2px}
        .pd{width:14px;height:14px;border-radius:50%;margin:0 auto 5px;border:2px solid var(--bdr)}
        .pd.completed{background:var(--g);border-color:var(--g)}.pd.current{background:var(--accent);border-color:var(--accent);box-shadow:0 0 0 4px rgba(108,92,231,.2)}.pd.pending{background:transparent}
        .pl{font-size:9px;color:var(--t2)}.ps.completed .pl{color:var(--g)}.ps.current .pl{color:var(--accent2);font-weight:600}
        .pline{position:absolute;top:14px;left:50%;right:-50%;height:2px;background:var(--bdr);z-index:0}
        .ps:last-child .pline{display:none}.ps.completed .pline{background:var(--g)}

        .skill-md{white-space:pre-wrap;font-size:12px;line-height:1.85;color:var(--t2)}
        .skill-empty{text-align:center;padding:24px 12px}
        .skill-empty .se-title{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:4px}
        .skill-empty .se-desc{font-size:11px;color:var(--t2);margin-bottom:10px}
        .se-cmd{font-family:'SF Mono',Consolas,monospace;font-size:11px;padding:8px 14px;background:var(--s2);border-radius:8px;color:var(--accent2);display:inline-block;cursor:pointer;border:1px solid var(--bdr);transition:all .15s}
        .se-cmd:hover{border-color:var(--accent);background:rgba(108,92,231,.1)}
        .jarvis-tag{font-size:9px;font-weight:600;color:var(--g);text-transform:uppercase;letter-spacing:.5px}

        .divider{border:none;border-top:1px solid var(--bdr);margin:36px 0 28px}
        .loading{text-align:center;padding:60px;color:var(--t2);font-size:15px}
        .empty{color:var(--t2);font-size:11px;font-style:italic}

        @media print{
            body{background:#fff!important;color:#111!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
            .topbar,.back,.btn-exp,.dash,.funnel,.skill-empty,.se-cmd{display:none!important}
            .detail.on{display:block!important}
            .shell{max-width:100%;padding:10px}
            .hero,.sec,.card{border:1px solid #ddd!important;background:#fff!important;box-shadow:none!important;break-inside:avoid}
            :root{--t1:#111;--t2:#555;--s1:#fff;--s2:#f5f5f5;--bdr:#ddd;--accent:#4a3fbf;--accent2:#5f4fcf}
            .kpis{display:none}
            .ph{display:block!important;text-align:center;padding:14px 0 8px;border-bottom:2px solid #111;margin-bottom:14px}
            .ph h1{font-size:20px}.ph p{font-size:10px;color:#555}
            .pf{display:block!important;text-align:center;margin-top:20px;padding-top:8px;border-top:1px solid #ddd;font-size:9px;color:#999}
            .section{break-inside:avoid}
        }
        .ph,.pf{display:none}
        .q-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:10px;font-weight:600;background:rgba(108,92,231,.15);color:var(--accent2);border:1px solid rgba(108,92,231,.3);cursor:default}
        .q-badge.active{background:rgba(253,203,110,.12);color:var(--y);border-color:rgba(253,203,110,.3);animation:pulse 2s infinite}
        .q-badge.done{background:var(--gbg);color:var(--g);border-color:rgba(0,184,148,.3)}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
        .gen-all{padding:6px 14px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
        .gen-all:hover{background:var(--accent2)}
        @media(max-width:1000px){.kpis{grid-template-columns:repeat(3,1fr)}.cols{grid-template-columns:1fr}.hero-kpis{grid-template-columns:repeat(3,1fr)}}
        @media(max-width:600px){.kpis{grid-template-columns:repeat(2,1fr)}}
    </style>
</head>
<body>
<div class="shell">
    <div class="ph"><h1>JARVIS Deal Intelligence Report</h1><p id="printDate"></p></div>
    <div class="topbar"><h1><span>JARVIS</span> Deal Intelligence</h1><div class="topbar-r" style="display:flex;align-items:center;gap:10px"><span id="qBadge" style="display:none" class="q-badge"></span><span id="lastRefresh"></span></div></div>
    <div id="loading" class="loading">Loading deal intelligence...</div>

    <!-- DASHBOARD -->
    <div id="dash" class="dash off">
        <div class="kpis" id="kpis"></div>
        <div class="funnel" id="funnel"></div>
        <div class="card">
            <div class="card-h"><h2>Pipeline</h2><span id="acntCnt" style="font-size:11px;color:var(--t2)"></span></div>
            <table><thead><tr><th>Account</th><th>Stage</th><th>Deal</th><th>Prob</th><th>MEDDPICC</th><th>Risks</th><th>Skills</th><th>Timeline</th><th>Updated</th></tr></thead><tbody id="tbl"></tbody></table>
        </div>
    </div>

    <!-- DETAIL -->
    <div id="detail" class="detail">
        <button class="back" onclick="goBack()">Back to Pipeline</button>
        <div id="detailContent"></div>
    </div>
    <div class="pf">Generated by JARVIS Deal Intelligence</div>
</div>

<script>
let D=null,REG=null,cur=null,Q=null,_qPoll=null;

async function init(){
    try{
        const r=await fetch('/api/accounts');D=await r.json();REG=D.skill_registry||{};Q=D.queue||null;
        if(!D.accounts||!D.accounts.length){document.getElementById('loading').innerHTML='<span style="color:var(--r)">No accounts found. Create an account folder with deal_stage.json.</span>';return}
        document.getElementById('loading').style.display='none';
        document.getElementById('dash').classList.remove('off');
        document.getElementById('lastRefresh').textContent='Updated '+new Date().toLocaleTimeString();
        renderDash();
        updateQBadge();
        if(Q&&Q.is_active) startQueuePoll();
    }catch(e){document.getElementById('loading').innerHTML='<span style="color:var(--r)">Error: '+e.message+' — Is JARVIS CRM server running?</span>'}
}

function updateQBadge(){
    if(!Q)return;
    var b=document.getElementById('qBadge');
    if(!b)return;
    if(Q.pending+Q.processing>0){
        b.style.display='inline-flex';
        b.className='q-badge active';
        b.textContent='⏳ '+Q.pending+' skill'+(Q.pending===1?'':'s')+' generating…';
    } else if(Q.done>0&&Q.pending===0&&Q.processing===0){
        b.style.display='inline-flex';
        b.className='q-badge done';
        b.textContent='✓ Intelligence up to date';
        setTimeout(function(){b.style.display='none';},4000);
    } else {
        b.style.display='none';
    }
}

function startQueuePoll(){
    if(_qPoll)return;
    _qPoll=setInterval(async function(){
        try{
            var r=await fetch('/api/queue');Q=await r.json();
            updateQBadge();
            if(!Q.is_active){
                clearInterval(_qPoll);_qPoll=null;
                // Refresh data now that generation is done
                var r2=await fetch('/api/accounts');D=await r2.json();REG=D.skill_registry||{};
                document.getElementById('lastRefresh').textContent='Updated '+new Date().toLocaleTimeString();
                if(cur){var a=D.accounts.find(function(x){return x.id===cur.id});if(a){cur=a;renderReport(a)}}
                renderDash();
            }
        }catch(e){}
    },5000);
}

async function generateAll(){
    try{
        var r=await fetch('/api/generate/all',{method:'POST'});var d=await r.json();
        if(d.count>0){
            Q={is_active:true,pending:d.count,processing:0,done:0,failed:0};
            updateQBadge();startQueuePoll();
            showToast('⚡ Queued '+d.count+' intelligence jobs — generating in background');
        } else {
            showToast('✓ All intelligence already generated');
        }
    }catch(e){showToast('❌ Could not reach CRM server')}
}

async function generateSkill(account,skill){
    try{
        var r=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({account:account,skill:skill})});
        var d=await r.json();
        if(d.queued){showToast('⏳ Queued: '+skill+' for '+account);startQueuePoll();}
    }catch(e){showToast('❌ Could not queue job')}
}

function showToast(msg){
    var t=document.createElement('div');
    t.style.cssText='position:fixed;bottom:24px;right:24px;background:var(--s2);border:1px solid var(--bdr);color:var(--t1);padding:12px 20px;border-radius:10px;font-size:12px;font-weight:500;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.4)';
    t.textContent=msg;document.body.appendChild(t);
    setTimeout(function(){t.remove();},3500);
}
const fmt$=n=>n>=1e6?'$'+(n/1e6).toFixed(1)+'M':n>=1e3?'$'+(n/1e3).toFixed(0)+'K':'$'+n;
const fmtP=n=>Math.round(n*100)+'%';
function bc(s){const l=s.toLowerCase();if(l.includes('won'))return'b-won';if(l.includes('lost'))return'b-lost';return l.includes('negot')||l.includes('close')?'b-neg':l.includes('qual')?'b-qual':l.includes('disc')?'b-disc':l.includes('demo')?'b-demo':'b-init'}
function mc(p){return p>=70?'var(--g)':p>=40?'var(--y)':'var(--r)'}
function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function renderDash(){
    const a=D.accounts,ps=D.pipeline_summary,avgP=a.length?Math.round(a.reduce((s,x)=>s+x.probability,0)/a.length*100):0;
    document.getElementById('kpis').innerHTML=
        '<div class="kpi"><div class="kl">Open Deals</div><div class="kv acc">'+ps.open_accounts+'</div><div class="ks">'+ps.total_accounts+' total</div></div>'+
        '<div class="kpi"><div class="kl">Open Pipeline</div><div class="kv blue">'+fmt$(ps.total_pipeline)+'</div></div>'+
        '<div class="kpi"><div class="kl">Weighted Pipeline</div><div class="kv green">'+fmt$(ps.total_weighted)+'</div></div>'+
        '<div class="kpi"><div class="kl">Closed Won</div><div class="kv green">'+ps.won_count+'</div><div class="ks">'+fmt$(ps.total_won)+'</div></div>'+
        '<div class="kpi"><div class="kl">Closed Lost</div><div class="kv red">'+ps.lost_count+'</div><div class="ks">'+fmt$(ps.total_lost)+'</div></div>'+
        '<div class="kpi"><div class="kl">Win Rate</div><div class="kv '+(ps.win_rate>=50?'green':ps.win_rate>=30?'yellow':'red')+'">'+ps.win_rate+'%</div><div class="ks">'+ps.won_count+'W / '+ps.lost_count+'L</div></div>'+
        '<div class="kpi"><div class="kl">Avg MEDDPICC</div><div class="kv '+(ps.avg_meddpicc>=60?'green':ps.avg_meddpicc>=40?'yellow':'red')+'">'+ps.avg_meddpicc+'%</div></div>'+
        '<div class="kpi"><div class="kl">High Risks</div><div class="kv '+(ps.high_risks?'red':'green')+'">'+ps.high_risks+'</div></div>'+
        '<div class="kpi"><div class="kl">Avg Deal Size</div><div class="kv blue">'+fmt$(ps.avg_deal_size)+'</div></div>'+
        '<div class="kpi"><div class="kl">Avg Probability</div><div class="kv '+(avgP>=50?'green':avgP>=30?'yellow':'red')+'">'+avgP+'%</div></div>'+
        '<div class="kpi"><div class="kl">Skills Intel</div><div class="kv acc">'+ps.total_skills_generated+'</div><div class="ks">by JARVIS</div></div>'+
        '<div class="kpi"><div class="kl">Coverage</div><div class="kv '+(ps.pipeline_coverage>=3?'green':ps.pipeline_coverage>=2?'yellow':'red')+'">'+ps.pipeline_coverage+'x</div><div class="ks">pipe / weighted</div></div>';

    var so=['Initial Contact','Discovery','Qualify','Demo','Negotiate','Closed Won','Closed Lost'],st=ps.stages||{};
    document.getElementById('funnel').innerHTML=so.map(function(s){var d=st[s]||{count:0,value:0},w=s==='Closed Won',l=s==='Closed Lost';return'<div class="fs" style="'+(w?'border-color:var(--g)':l?'border-color:var(--r)':'')+'"><div class="fn">'+s+'</div><div class="fc" style="color:'+(w?'var(--g)':l?'var(--r)':'var(--accent2)')+'">'+d.count+'</div><div class="fv">'+fmt$(d.value)+'</div></div>'}).join('');

    document.getElementById('acntCnt').textContent=a.length+' accounts';
    var parents=a.filter(function(x){return!x.parent}),rows='';
    parents.forEach(function(p){rows+=aRow(p,0);a.filter(function(x){return x.parent===p.folder}).forEach(function(sub){rows+=aRow(sub,1)})});
    document.getElementById('tbl').innerHTML=rows;
}
function aRow(a,sub){
    var mp=a.meddpicc.percentage,hr=a.risks.filter(function(r){return r.level==='high'}).length,mr=a.risks.filter(function(r){return r.level==='medium'}).length;
    return'<tr onclick="openAcct(\''+a.id+'\')"><td><span class="'+(sub?'asub':'an')+'">'+a.name+'</span></td><td><span class="badge '+bc(a.stage)+'">'+a.stage+'</span></td><td style="font-weight:600">'+fmt$(a.deal_size)+'</td><td>'+fmtP(a.probability)+'</td><td><span class="mb"><span class="mf" style="width:'+mp+'%;background:'+mc(mp)+'"></span></span>'+mp+'%</td><td>'+(hr?'<span class="rd h"></span>'+hr:'')+(mr?' <span class="rd m"></span>'+mr:'')+(!hr&&!mr?'<span class="rd l"></span>Clean':'')+'</td><td><span class="skill-count">'+a.skills_generated+'/'+a.skills_total+'</span></td><td style="font-size:11px">'+a.timeline+'</td><td style="font-size:11px;color:var(--t2)">'+a.last_updated+'</td></tr>';
}

function openAcct(id){
    var a=D.accounts.find(function(x){return x.id===id});if(!a)return;
    cur=a;
    document.getElementById('dash').classList.add('off');
    document.getElementById('detail').classList.add('on');
    window.scrollTo(0,0);
    renderReport(a);
}

function renderReport(a){
    var mp=a.meddpicc,wv=a.deal_size*a.probability,dc=a.discovery_completeness,comp=a.competitive_situation||{},nm=a.next_milestone||{};
    var mLabels={metrics:'Metrics',economic_buyer:'Economic Buyer',decision_criteria:'Decision Criteria',decision_process:'Decision Process',paper_process:'Paper Process',implications:'Implications of Pain',champion:'Champion',competition:'Competition'};
    var h='';

    // HERO
    h+='<div class="hero"><div class="hero-top"><div><h2>'+a.name+'</h2>'+(a.parent?'<div class="par">Sub-account of '+a.parent+'</div>':'')+'</div><button class="btn-exp" onclick="exportPDF()">Export Full Report (PDF)</button></div><div class="hero-kpis"><div class="hk"><div class="hl">Stage</div><div class="hv"><span class="badge '+bc(a.stage)+'" style="font-size:13px;padding:5px 14px">'+a.stage+'</span></div></div><div class="hk"><div class="hl">Deal Size</div><div class="hv blue">'+fmt$(a.deal_size)+'</div></div><div class="hk"><div class="hl">Win Prob</div><div class="hv" style="color:'+(a.probability>=.5?'var(--g)':a.probability>=.3?'var(--y)':'var(--r)')+'">'+fmtP(a.probability)+'</div></div><div class="hk"><div class="hl">Weighted</div><div class="hv green">'+fmt$(wv)+'</div></div><div class="hk"><div class="hl">MEDDPICC</div><div class="hv" style="color:'+mc(mp.percentage)+'">'+mp.percentage+'%</div></div><div class="hk"><div class="hl">Skills</div><div class="hv acc">'+a.skills_generated+'/'+a.skills_total+'</div></div></div></div>';

    // PROGRESSION
    if(a.deal_progression.length){
        h+='<div class="section"><div class="sec"><div class="sec-h">Deal Progression</div><div class="sec-b"><div class="prog">'+a.deal_progression.map(function(s){return'<div class="ps '+s.status+'"><div class="pline"></div><div class="pd '+s.status+'"></div><div class="pl">'+s.name+'</div></div>'}).join('')+'</div></div></div></div>';
    }

    // DEAL OVERVIEW
    h+='<div class="section"><div class="section-label">Deal Overview</div><div class="cols"><div class="sec"><div class="sec-h">Key Metrics</div><div class="sec-b"><div class="cg"><div class="ci"><div class="cl">Deal Size</div><div class="cv blue">'+fmt$(a.deal_size)+'</div></div><div class="ci"><div class="cl">Win Probability</div><div class="cv" style="color:'+(a.probability>=.5?'var(--g)':'var(--y)')+'">'+fmtP(a.probability)+'</div></div><div class="ci"><div class="cl">Weighted Value</div><div class="cv green">'+fmt$(wv)+'</div></div><div class="ci"><div class="cl">Timeline</div><div class="cv">'+a.timeline+'</div></div></div>'+(a.pain_points.length?'<div style="margin-top:14px"><div style="font-size:10px;color:var(--t2);text-transform:uppercase;font-weight:600;margin-bottom:6px">Key Pain Points</div>'+a.pain_points.map(function(p){return'<div style="padding:3px 0;font-size:12px">&bull; '+p+'</div>'}).join('')+'</div>':'')+'</div></div>';
    h+='<div class="sec"><div class="sec-h">Key Stakeholders <span style="color:var(--t2);font-weight:400">'+a.stakeholders.length+'</span></div><div class="sec-b">'+(a.stakeholders.length?a.stakeholders.map(function(s){var m=s.match(/^(.+?)\s*[\(\-]\s*(.+?)[\)\s]*$/)||[null,s,''];var nm=m[1]||s,rl=m[2]||'';var ini=nm.split(' ').map(function(w){return w[0]}).join('').substring(0,2).toUpperCase();return'<div class="si"><div class="sav">'+ini+'</div><div><div class="sn">'+nm+'</div>'+(rl?'<div class="sr">'+rl+'</div>':'')+'</div></div>'}).join(''):'<div class="empty">No stakeholders mapped</div>')+'</div></div></div></div>';

    // MEDDPICC
    h+='<div class="section"><div class="section-label">MEDDPICC Qualification</div><div class="sec"><div class="sec-h">MEDDPICC Score <span style="font-size:20px;font-weight:700;color:'+mc(mp.percentage)+'">'+mp.total+'/'+mp.max+' ('+mp.percentage+'%)</span></div><div class="sec-b"><div class="mg">';
    Object.keys(mLabels).forEach(function(k){var v=mLabels[k],s=mp[k]||0,p=s*10,c=p>=70?'var(--g)':p>=40?'var(--y)':'var(--r)';h+='<div class="mi"><span class="ml">'+v+'</span><div class="mbar"><div class="mfl" style="width:'+p+'%;background:'+c+'"></div></div><span class="ms" style="color:'+c+'">'+s+'/10</span></div>'});
    h+='</div>'+skillBlock('meddpicc',a,'JARVIS MEDDPICC Analysis')+'</div></div></div>';

    // RISKS
    h+='<div class="section"><div class="section-label">Risk Analysis</div><div class="sec"><div class="sec-h">Deal Risks <span style="color:'+(a.risks.filter(function(r){return r.level==='high'}).length?'var(--r)':'var(--g)')+'">'+a.risks.length+' identified</span></div><div class="sec-b">'+(a.risks.length?a.risks.map(function(r){return'<div class="ri '+r.level+'"><span class="rb '+r.level+'">'+r.level+'</span><div><strong>'+r.cat+'</strong> &mdash; '+r.text+'</div></div>'}).join(''):'<div style="color:var(--g);font-size:12px;padding:8px 0">No significant risks identified</div>')+skillBlock('risk_report',a,'JARVIS AI Risk Report')+'</div></div></div>';

    // COMPETITION
    h+='<div class="section"><div class="section-label">Competitive Intelligence</div><div class="cols"><div class="sec"><div class="sec-h">Competitive Landscape</div><div class="sec-b"><div class="cg"><div class="ci"><div class="cl">Primary Competitor</div><div class="cv">'+(comp.primary_competitor||'Unknown')+'</div></div><div class="ci"><div class="cl">Status</div><div class="cv">'+(comp.competitor_status||'Unknown')+'</div></div><div class="ci"><div class="cl">Our Price</div><div class="cv">'+(comp.our_price||'TBD')+'</div></div><div class="ci"><div class="cl">Win vs Competitor</div><div class="cv" style="color:'+((comp.win_probability_vs_competitor||0)>=.5?'var(--g)':'var(--r)')+'">'+(comp.win_probability_vs_competitor?fmtP(comp.win_probability_vs_competitor):'TBD')+'</div></div></div>'+(a.constraints&&a.constraints.length?'<div style="margin-top:12px"><div style="font-size:10px;color:var(--t2);text-transform:uppercase;font-weight:600;margin-bottom:4px">Constraints</div>'+a.constraints.map(function(c){return'<div style="padding:2px 0;font-size:12px;color:var(--y)">&bull; '+c+'</div>'}).join('')+'</div>':'')+skillBlock('competitive_intelligence',a,'JARVIS Competitive Intel')+'</div></div>';
    h+='<div class="sec"><div class="sec-h">Battlecard</div><div class="sec-b">'+skillBlock('battlecard',a,'JARVIS Battlecard',true)+'</div></div></div></div>';

    // DISCOVERY
    h+='<div class="section"><div class="section-label">Discovery &amp; Research</div><div class="cols"><div class="sec"><div class="sec-h">Discovery Completeness <span style="color:'+(dc.percentage>=70?'var(--g)':dc.percentage>=40?'var(--y)':'var(--r)')+'">'+dc.percentage+'%</span></div><div class="sec-b"><div class="dp">'+Array.from({length:dc.total},function(_,i){return'<div class="ds '+(i<dc.completed?'ok':'')+'"></div>'}).join('')+'</div><div style="font-size:11px;color:var(--t2);margin-bottom:8px">'+dc.completed+'/'+dc.total+' areas covered</div>'+(dc.missing.length?'<div style="margin-bottom:10px"><div style="font-size:10px;color:var(--r);text-transform:uppercase;font-weight:600;margin-bottom:4px">Missing</div>'+dc.missing.map(function(m){return'<div style="padding:2px 0;font-size:11px;color:var(--y)">&cir; '+m+'</div>'}).join('')+'</div>':'<div style="color:var(--g);font-size:11px;margin-bottom:8px">All key areas covered</div>')+(a.discovery_notes?'<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--bdr)"><div style="font-size:10px;color:var(--t2);text-transform:uppercase;font-weight:600;margin-bottom:6px">Discovery Notes</div><div class="skill-md">'+esc(a.discovery_notes)+'</div></div>':'')+'</div></div>';
    h+='<div class="sec"><div class="sec-h">Company Research</div><div class="sec-b"><div class="skill-md">'+esc(a.company_info||'No company research')+'</div></div></div></div></div>';

    // ACTIONS & ACTIVITIES
    h+='<div class="section"><div class="section-label">Actions &amp; Activities</div><div class="cols"><div class="sec"><div class="sec-h">Next Actions <span style="color:var(--t2);font-weight:400">'+a.next_actions.length+'</span></div><div class="sec-b">'+(a.next_actions.length?a.next_actions.map(function(x,i){return'<div class="ai"><div class="anum">'+(i+1)+'</div><div>'+x+'</div></div>'}).join(''):'<div class="empty">No actions defined in CLAUDE.md</div>')+(nm.activity?'<div style="margin-top:14px;padding:14px;background:var(--s2);border-radius:10px"><div style="font-size:10px;color:var(--accent2);text-transform:uppercase;font-weight:600;margin-bottom:4px">Next Milestone</div><div style="font-size:14px;font-weight:600;margin-top:2px">'+nm.activity+'</div><div style="font-size:11px;color:var(--t2);margin-top:2px">'+(nm.date||'')+' &mdash; '+(nm.description||'')+'</div></div>':'')+'</div></div>';
    h+='<div class="sec"><div class="sec-h">Recent Activities <span style="color:var(--t2);font-weight:400">'+a.activities.length+'</span></div><div class="sec-b">'+(a.activities.length?a.activities.map(function(x){return'<div style="padding:8px 0;border-bottom:1px solid var(--bdr);display:flex;gap:8px;font-size:12px"><span style="color:var(--g)">&check;</span><div>'+x+'</div></div>'}).join(''):'<div class="empty">No activities recorded</div>')+'</div></div></div></div>';

    // JARVIS GENERATED INTELLIGENCE
    var skillOrder=['account_summary','quick_insights','value_architecture','competitor_pricing','meeting_prep','demo_strategy','proposal','followup_email','technical_risk','sow'];
    var generated=skillOrder.filter(function(k){return a.skill_outputs[k]});
    var pending=skillOrder.filter(function(k){return!a.skill_outputs[k]});

    if(generated.length){
        h+='<hr class="divider"><div class="section"><div class="section-label">JARVIS AI Intelligence ('+generated.length+' generated)</div>';
        generated.forEach(function(k){var info=REG[k]||{label:k};h+='<div class="sec" style="margin-bottom:14px"><div class="sec-h">'+info.label+' <span class="jarvis-tag">Generated by JARVIS</span></div><div class="sec-b"><div class="skill-md">'+esc(a.skill_outputs[k])+'</div></div></div>'});
        h+='</div>';
    }
    if(pending.length){
        var queued=a.skills_queued||[];
        var isActive=Q&&Q.is_active;
        h+='<hr class="divider"><div class="section"><div class="section-label">Intelligence Generating ('+pending.length+' in progress)</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">';
        pending.forEach(function(k){
            var info=REG[k]||{label:k,cmd:k};
            var inQ=queued.indexOf(k)>=0||isActive;
            if(inQ){
                h+='<div class="sec"><div class="sec-b"><div class="skill-empty"><div class="se-title">'+info.label+'</div><div style="margin:10px 0;color:var(--y);font-size:12px;font-weight:600">⏳ Generating…</div><div style="font-size:10px;color:var(--t3)">Refreshes automatically when ready</div></div></div></div>';
            } else {
                h+='<div class="sec"><div class="sec-b"><div class="skill-empty"><div class="se-title">'+info.label+'</div><div style="font-size:10px;color:var(--t3);margin-bottom:8px">Will auto-generate when JARVIS is active</div><div class="se-cmd" onclick="copyCmd(this)" title="Click to copy">Run '+info.cmd+' for '+a.name+'</div></div></div></div>';
            }
        });
        h+='</div></div>';
    }

    document.getElementById('detailContent').innerHTML=h;
}

function skillBlock(key,a,title,standalone){
    var content=a.skill_outputs[key];
    if(content)return'<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--bdr)"><span class="jarvis-tag">'+title+'</span><div class="skill-md" style="margin-top:6px">'+esc(content)+'</div></div>';
    if(standalone){var info=REG[key]||{cmd:key};return'<div class="skill-empty"><div class="se-title">Not Generated Yet</div><div class="se-desc">Ask JARVIS:</div><div class="se-cmd" onclick="copyCmd(this)">"Run '+info.cmd+' for '+a.name+'"</div></div>'}
    return'';
}

function goBack(){document.getElementById('dash').classList.remove('off');document.getElementById('detail').classList.remove('on');cur=null}
function exportPDF(){if(!cur)return;document.getElementById('printDate').textContent=cur.name+' \u2014 '+new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});window.print()}
function copyCmd(el){navigator.clipboard.writeText(el.textContent.trim());var o=el.textContent;el.textContent='Copied!';el.style.color='var(--g)';setTimeout(function(){el.textContent=o;el.style.color=''},1200)}
window.addEventListener('load',init);
</script>
</body>
</html>

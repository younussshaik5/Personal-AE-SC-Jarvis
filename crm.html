<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS — Deal Intelligence</title>
<style>
:root{
  --bg:#0f1117;--s1:#1a1d27;--s2:#232736;--bdr:#2d3148;
  --t1:#e4e6f0;--t2:#8b8fa3;--t3:#5d6180;
  --accent:#6c5ce7;--accent2:#a29bfe;
  --g:#00b894;--gbg:rgba(0,184,148,.12);
  --y:#fdcb6e;--ybg:rgba(253,203,110,.12);
  --r:#ff6b6b;--rbg:rgba(255,107,107,.12);
  --b:#74b9ff;--rad:12px;--sw:240px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased}
.g{color:var(--g)}.y{color:var(--y)}.r{color:var(--r)}.b{color:var(--b)}.acc{color:var(--accent2)}

/* ── Topbar ───────────────────────────────────────────── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:11px 20px;border-bottom:1px solid var(--bdr);background:var(--s1);position:sticky;top:0;z-index:200;height:48px}
.topbar h1{font-size:16px;font-weight:700}.topbar h1 span{color:var(--accent2)}
.topbar-r{display:flex;align-items:center;gap:10px}
.gen-all{padding:5px 13px;background:var(--accent);color:#fff;border:none;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer}
.gen-all:hover{background:var(--accent2)}
.q-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:600;background:rgba(108,92,231,.15);color:var(--accent2);border:1px solid rgba(108,92,231,.3)}
.q-badge.active{background:var(--ybg);color:var(--y);border-color:rgba(253,203,110,.3);animation:pulse 2s infinite}
.q-badge.done{background:var(--gbg);color:var(--g);border-color:rgba(0,184,148,.3)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* ── Layout ───────────────────────────────────────────── */
.workspace{display:flex;height:calc(100vh - 48px)}
.sidebar{width:var(--sw);flex-shrink:0;border-right:1px solid var(--bdr);background:var(--s1);display:flex;flex-direction:column;overflow:hidden}
.main{flex:1;min-width:0;overflow-y:auto;height:100%}

/* ── Sidebar ──────────────────────────────────────────── */
.sb-kpis{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:12px}
.sk{background:var(--s2);border-radius:8px;padding:8px 10px}
.sk .skl{font-size:9px;text-transform:uppercase;color:var(--t2);letter-spacing:.5px;margin-bottom:2px}
.sk .skv{font-size:16px;font-weight:700}
.sb-label{padding:8px 14px 4px;font-size:9px;text-transform:uppercase;color:var(--t3);letter-spacing:.8px;font-weight:700;border-top:1px solid var(--bdr)}
.sb-list{overflow-y:auto;flex:1;padding-bottom:12px}
.sli{padding:8px 14px;cursor:pointer;border-left:3px solid transparent;transition:all .1s}
.sli:hover{background:var(--s2);border-left-color:var(--bdr)}
.sli.active{background:rgba(108,92,231,.1);border-left-color:var(--accent)}
.sli-top{display:flex;align-items:center;gap:7px;margin-bottom:2px}
.sli-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sli-name{font-size:12px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sli-sub{font-size:10px;color:var(--t3);display:flex;align-items:center;gap:8px;padding-left:14px}
.sli-child{padding-left:22px}
.sli-child .sli-name::before{content:'└ ';color:var(--t3)}

/* ── Dashboard ────────────────────────────────────────── */
.main-pad{padding:20px 24px;max-width:960px}
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:18px}
.kpi{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--rad);padding:13px 15px}
.kpi .kl{font-size:9px;text-transform:uppercase;letter-spacing:.7px;color:var(--t2);margin-bottom:4px}
.kpi .kv{font-size:22px;font-weight:700}
.kpi .ks{font-size:10px;color:var(--t3);margin-top:2px}
.funnel{display:flex;gap:6px;margin-bottom:18px}
.fs{flex:1;min-width:72px;background:var(--s1);border:1px solid var(--bdr);border-radius:var(--rad);padding:11px 8px;text-align:center;position:relative}
.fs .fn{font-size:9px;text-transform:uppercase;color:var(--t2);margin-bottom:2px}
.fs .fc{font-size:18px;font-weight:700;color:var(--accent2)}
.fs .fv{font-size:9px;color:var(--t2)}
.fs::after{content:'›';position:absolute;right:-5px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:16px;z-index:1}
.fs:last-child::after{display:none}
.card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--rad);overflow:hidden;margin-bottom:18px}
.card-h{padding:12px 16px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center}
.card-h h2{font-size:13px;font-weight:600}
table{width:100%;border-collapse:collapse}
thead th{padding:8px 13px;text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--t2);border-bottom:1px solid var(--bdr);background:var(--s2);font-weight:600}
tbody td{padding:10px 13px;border-bottom:1px solid var(--bdr);font-size:12px}
tbody tr{cursor:pointer;transition:background .1s}
tbody tr:hover{background:var(--s2)}
tbody tr:last-child td{border-bottom:none}
.an{font-weight:600;color:var(--accent2)}
.asub{font-size:11px;color:var(--t2);padding-left:12px}.asub::before{content:'└ '}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:9px;font-weight:700}
.b-neg{background:var(--gbg);color:var(--g)}.b-qual{background:var(--ybg);color:var(--y)}.b-disc{background:rgba(116,185,255,.12);color:var(--b)}.b-demo{background:rgba(108,92,231,.15);color:var(--accent2)}.b-init{background:rgba(139,143,163,.1);color:var(--t2)}.b-won{background:var(--gbg);color:var(--g)}.b-lost{background:var(--rbg);color:var(--r)}
.mb{width:40px;height:4px;background:var(--s2);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:4px}
.mf{height:100%;border-radius:3px}
.rd{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:2px}
.rd.h{background:var(--r)}.rd.m{background:var(--y)}.rd.l{background:var(--g)}
.skill-count{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;background:rgba(108,92,231,.15);color:var(--accent2)}

/* ── Detail header ────────────────────────────────────── */
.dh{padding:18px 24px 0;border-bottom:1px solid var(--bdr);background:var(--s1)}
.dh-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;gap:12px}
.dh-title{font-size:22px;font-weight:800;letter-spacing:-.3px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.dh-sub{font-size:11px;color:var(--t2);margin-top:4px}
.dh-actions{display:flex;gap:8px;flex-shrink:0;margin-top:2px}
.btn-p{padding:6px 14px;background:var(--accent);color:#fff;border:none;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer}
.btn-p:hover{background:var(--accent2)}
.btn-s{padding:6px 12px;background:var(--s2);color:var(--t1);border:1px solid var(--bdr);border-radius:7px;font-size:11px;font-weight:600;cursor:pointer}
.btn-s:hover{border-color:var(--accent2);color:var(--accent2)}
.dh-metrics{display:flex;gap:24px;padding:0 0 14px;flex-wrap:wrap}
.dhm .dhml{font-size:9px;text-transform:uppercase;color:var(--t2);letter-spacing:.5px}
.dhm .dhmv{font-size:19px;font-weight:700;line-height:1.25}
.health-pill{display:inline-flex;align-items:center;gap:6px;padding:3px 11px;border-radius:20px;font-size:11px;font-weight:700}
.health-pill.green{background:var(--gbg);color:var(--g);border:1px solid rgba(0,184,148,.25)}
.health-pill.yellow{background:var(--ybg);color:var(--y);border:1px solid rgba(253,203,110,.25)}
.health-pill.red{background:var(--rbg);color:var(--r);border:1px solid rgba(255,107,107,.25)}
.hd{width:6px;height:6px;border-radius:50%}
.hd.green{background:var(--g)}.hd.yellow{background:var(--y)}.hd.red{background:var(--r)}

/* ── Tabs ─────────────────────────────────────────────── */
.tabs{display:flex;background:var(--s1);border-bottom:1px solid var(--bdr);padding:0 24px}
.tab{padding:9px 15px;font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;user-select:none}
.tab:hover{color:var(--t1)}
.tab.active{color:var(--accent2);border-bottom-color:var(--accent)}
.tp{display:none;padding:20px 24px;max-width:960px}
.tp.on{display:block}

/* ── Sections ─────────────────────────────────────────── */
.sec{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--rad);overflow:hidden;margin-bottom:12px}
.sec-h{padding:11px 15px;border-bottom:1px solid var(--bdr);font-size:12px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.sec-b{padding:13px 15px}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;align-items:start}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.lbl{font-size:9px;text-transform:uppercase;color:var(--t3);letter-spacing:.8px;font-weight:700;margin-bottom:7px}

/* ── Collapsible AI blocks ────────────────────────────── */
.coll{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--rad);overflow:hidden;margin-bottom:8px}
.coll-h{padding:10px 15px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;transition:background .1s}
.coll-h:hover{background:var(--s2)}
.coll-title{font-size:11px;font-weight:700;display:flex;align-items:center;gap:8px}
.ai-tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--g);background:var(--gbg);padding:2px 7px;border-radius:8px}
.coll-arr{font-size:10px;color:var(--t3);transition:transform .18s}
.coll.open .coll-arr{transform:rotate(90deg)}
.coll-b{display:none;padding:13px 15px;border-top:1px solid var(--bdr)}
.coll.open .coll-b{display:block}

/* ── MEDDPICC ─────────────────────────────────────────── */
.mg{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.mi{display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--s2);border-radius:8px}
.mi .ml{font-size:11px;color:var(--t2);min-width:134px}
.mi .mbar{flex:1;height:7px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden}
.mi .mfl{height:100%;border-radius:4px}
.mi .ms{font-size:11px;font-weight:700;min-width:28px;text-align:right}
.mi .mrank{font-size:9px;font-weight:700;text-transform:uppercase;min-width:42px;text-align:right;letter-spacing:.3px}

/* ── Stakeholder cards ────────────────────────────────── */
.smap{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
.scard{background:var(--s2);border:1px solid var(--bdr);border-radius:10px;padding:12px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:4px;position:relative}
.scard.champion{border-color:rgba(0,184,148,.4)}.scard.blocker{border-color:rgba(255,107,107,.3)}.scard.economic{border-color:rgba(253,203,110,.4)}
.sav{width:34px;height:34px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.sav.champion{background:var(--g)}.sav.blocker{background:var(--r)}.sav.economic{background:var(--y);color:#111}
.sn{font-weight:600;font-size:12px;line-height:1.3}
.sr{font-size:10px;color:var(--t2)}
.srole{font-size:9px;font-weight:700;text-transform:uppercase;padding:2px 7px;border-radius:8px;margin-top:2px}
.srole.champion{background:var(--gbg);color:var(--g)}.srole.blocker{background:var(--rbg);color:var(--r)}.srole.economic{background:var(--ybg);color:var(--y)}.srole.default{background:rgba(108,92,231,.15);color:var(--accent2)}
.cs{position:absolute;top:5px;right:8px;font-size:12px}

/* ── Risk items ───────────────────────────────────────── */
.ri{display:flex;gap:9px;padding:9px 11px;border-radius:8px;margin-bottom:6px;font-size:12px;align-items:flex-start}
.ri.high{background:var(--rbg)}.ri.medium{background:var(--ybg)}.ri.low{background:var(--gbg)}
.rb{font-size:9px;font-weight:700;text-transform:uppercase;padding:2px 7px;border-radius:4px;white-space:nowrap}
.rb.high{background:var(--r);color:#fff}.rb.medium{background:var(--y);color:#111}.rb.low{background:var(--g);color:#fff}

/* ── Health gauges ────────────────────────────────────── */
.hstrip{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:0}
.hg{background:var(--s2);border-radius:8px;padding:10px 12px}
.hgl{font-size:9px;text-transform:uppercase;color:var(--t2);letter-spacing:.5px;margin-bottom:5px}
.hgbar{height:6px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden;margin-bottom:4px}
.hgf{height:100%;border-radius:4px}
.hgv{font-size:15px;font-weight:700}

/* ── Stage progression ────────────────────────────────── */
.prog{display:flex;margin:8px 0 4px}
.ps{flex:1;text-align:center;position:relative;padding:8px 2px}
.pd{width:12px;height:12px;border-radius:50%;margin:0 auto 5px;border:2px solid var(--bdr)}
.pd.completed{background:var(--g);border-color:var(--g)}.pd.current{background:var(--accent);border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,92,231,.2)}.pd.pending{background:transparent}
.pl{font-size:9px;color:var(--t2)}.ps.completed .pl{color:var(--g)}.ps.current .pl{color:var(--accent2);font-weight:600}
.pline{position:absolute;top:13px;left:50%;right:-50%;height:2px;background:var(--bdr);z-index:0}
.ps:last-child .pline{display:none}.ps.completed .pline{background:var(--g)}

/* ── Action items ─────────────────────────────────────── */
.ai{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--bdr);font-size:12px}
.ai:last-child{border-bottom:none}
.anum{min-width:20px;height:20px;background:var(--accent);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;margin-top:1px}
.anum.r{background:var(--r)}.anum.y{background:var(--y);color:#111}.anum.g{background:var(--g)}

/* ── Discovery bar ────────────────────────────────────── */
.dp{display:flex;gap:4px;margin-bottom:6px}
.ds{flex:1;height:6px;border-radius:3px;background:var(--s2)}.ds.ok{background:var(--g)}

/* ── Metric cells ─────────────────────────────────────── */
.cg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cg4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.ci{padding:10px 12px;background:var(--s2);border-radius:8px}
.ci .cl{font-size:9px;text-transform:uppercase;color:var(--t2);letter-spacing:.5px;margin-bottom:3px}
.ci .cv{font-size:14px;font-weight:700}

/* ── Pending skills ───────────────────────────────────── */
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.pk{background:var(--s1);border:1px solid var(--bdr);border-radius:10px;padding:11px 13px}
.pk .pkl{font-size:11px;font-weight:600;margin-bottom:3px}
.pk .pkd{font-size:10px;color:var(--t3)}
.se-cmd{font-family:'SF Mono',Consolas,monospace;font-size:10px;padding:4px 9px;background:var(--s2);border-radius:6px;color:var(--accent2);display:inline-block;cursor:pointer;border:1px solid var(--bdr);margin-top:5px;transition:border-color .1s}
.se-cmd:hover{border-color:var(--accent)}

/* ── Markdown ─────────────────────────────────────────── */
.md-body{white-space:normal;font-size:12px;line-height:1.75;color:var(--t2)}
.md-body h1,.md-body h2,.md-body h3,.md-body h4{color:var(--t1);font-weight:600;margin:10px 0 5px}
.md-body h1{font-size:14px}.md-body h2{font-size:13px;border-bottom:1px solid var(--bdr);padding-bottom:3px}.md-body h3{font-size:12px}.md-body h4{font-size:11px}
.md-body p{margin:3px 0 7px}.md-body ul,.md-body ol{margin:3px 0 7px;padding-left:16px}.md-body li{margin:2px 0}
.md-body strong{color:var(--t1);font-weight:600}.md-body em{color:var(--accent2);font-style:italic}
.md-body code{background:var(--s1);color:var(--accent2);padding:1px 5px;border-radius:4px;font-family:monospace;font-size:11px}
.md-body pre{background:var(--s1);border:1px solid var(--bdr);border-radius:6px;padding:10px;overflow-x:auto;margin:6px 0}
.md-body table{width:100%;border-collapse:collapse;margin:6px 0;font-size:11px}
.md-body th{background:var(--s1);color:var(--t1);font-weight:600;padding:5px 9px;text-align:left;border:1px solid var(--bdr)}
.md-body td{padding:4px 9px;border:1px solid var(--bdr);color:var(--t2)}
.md-body tr:nth-child(even) td{background:rgba(255,255,255,.02)}
.md-body hr{border:none;border-top:1px solid var(--bdr);margin:8px 0}
.md-body blockquote{border-left:3px solid var(--accent);margin:5px 0;padding:3px 10px;color:var(--t3)}
.empty{color:var(--t2);font-size:11px;font-style:italic}

/* ── Print ────────────────────────────────────────────── */
.ph,.pf{display:none}
@media print{
  body{background:#fff!important;color:#111!important}
  .topbar,.dh-actions,.sidebar,.tabs,.gen-all,.q-badge,.coll-arr{display:none!important}
  .workspace{display:block}
  .main{height:auto;overflow:visible}
  .tp{display:block!important}
  .coll-b{display:block!important}
  .dh{position:static!important;background:#fff!important;border-color:#ddd!important}
  :root{--t1:#111;--t2:#555;--s1:#fff;--s2:#f5f5f5;--bdr:#ddd;--accent:#4a3fbf;--accent2:#5f4fcf;--g:#00875a;--r:#c0392b;--y:#b8860b}
  .ph{display:block!important;padding:12px 0 10px;border-bottom:2px solid #111;margin-bottom:14px}
  .pf{display:block!important;text-align:center;margin-top:20px;padding-top:8px;border-top:1px solid #ddd;font-size:9px;color:#999}
}
@media(max-width:860px){.sidebar{display:none}.cols{grid-template-columns:1fr}.mg{grid-template-columns:1fr}.hstrip{grid-template-columns:1fr 1fr}.cg4{grid-template-columns:1fr 1fr}.row3{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="ph"><h1>JARVIS Deal Intelligence</h1><p id="printDate"></p></div>
<div class="topbar">
  <h1><span>JARVIS</span> Deal Intelligence</h1>
  <div class="topbar-r">
    <span id="qBadge" style="display:none" class="q-badge"></span>
    <button class="gen-all" onclick="generateAll()">⚡ Generate All</button>
    <span id="lastRef" style="font-size:10px;color:var(--t3)"></span>
  </div>
</div>
<div id="loading" style="padding:60px 24px;color:var(--t2)">Loading deal intelligence…</div>
<div class="workspace" id="ws" style="display:none">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sb-kpis" id="sbKpis"></div>
    <div class="sb-label">Pipeline</div>
    <div class="sb-list" id="sbList"></div>
  </div>
  <!-- Main -->
  <div class="main" id="mainArea">
    <!-- Dashboard -->
    <div id="dash" class="main-pad">
      <div class="kpis" id="kpis"></div>
      <div class="funnel" id="funnel"></div>
      <div class="card">
        <div class="card-h"><h2>Pipeline</h2><span id="acntCnt" style="font-size:11px;color:var(--t2)"></span></div>
        <table><thead><tr><th>Account</th><th>Stage</th><th>Deal</th><th>Prob</th><th>MEDDPICC</th><th>Risks</th><th>Intel</th><th>Updated</th></tr></thead><tbody id="tbl"></tbody></table>
      </div>
    </div>
    <!-- Detail -->
    <div id="detail" style="display:none">
      <div class="dh" id="dh"></div>
      <div class="tabs" id="tabs"></div>
      <div id="panels"></div>
    </div>
  </div>
</div>
<div class="pf">Generated by JARVIS Deal Intelligence · Confidential</div>

<script>
// ── Markdown ──────────────────────────────────────────────────────
function md(src){
  if(!src)return'';
  function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
  function inl(t){
    t=esc(t);
    t=t.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
    t=t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    t=t.replace(/\*([^*\n]+?)\*/g,'<em>$1</em>');
    t=t.replace(/`([^`\n]+)`/g,'<code>$1</code>');
    return t;
  }
  var lines=src.split('\n'),out=[],inUl=false,inOl=false,inTbl=false,rows=[],m;
  function fTbl(){if(!rows.length)return;var h='<table>',hdr=true;rows.forEach(function(r){if(/^[\s\-:|]+$/.test(r.replace(/\|/g,''))){hdr=false;return;}var tag=hdr?'th':'td',cells=r.replace(/^\||\|$/g,'').split('|');h+='<tr>'+cells.map(function(c){return'<'+tag+'>'+inl(c.trim())+'</'+tag+'>'}).join('')+'</tr>';if(hdr)hdr=false;});out.push(h+'</table>');rows=[];inTbl=false;}
  function fUl(){if(inUl){out.push('</ul>');inUl=false;}}
  function fOl(){if(inOl){out.push('</ol>');inOl=false;}}
  lines.forEach(function(line){
    if(/^\|/.test(line)){fUl();fOl();inTbl=true;rows.push(line.trim());return;}
    if(inTbl)fTbl();
    if((m=line.match(/^(#{1,6}) (.+)$/))){fUl();fOl();out.push('<h'+m[1].length+'>'+inl(m[2])+'</h'+m[1].length+'>');return;}
    if(/^-{3,}\s*$/.test(line)){fUl();fOl();out.push('<hr>');return;}
    if((m=line.match(/^[*\-] (.+)/))){fOl();if(!inUl){out.push('<ul>');inUl=true;}out.push('<li>'+inl(m[1])+'</li>');return;}
    if((m=line.match(/^\d+\. (.+)/))){fUl();if(!inOl){out.push('<ol>');inOl=true;}out.push('<li>'+inl(m[1])+'</li>');return;}
    fUl();fOl();
    if(line.trim()==='')return;
    out.push('<p>'+inl(line)+'</p>');
  });
  fUl();fOl();if(inTbl)fTbl();
  return out.join('');
}

let D=null,REG=null,cur=null,Q=null,_qp=null,_tab='overview';

// ── Helpers ───────────────────────────────────────────────────────
const f$=n=>n>=1e6?'$'+(n/1e6).toFixed(1)+'M':n>=1e3?'$'+(n/1e3).toFixed(0)+'K':'$'+n;
const fP=n=>Math.round(n*100)+'%';
function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function bc(s){var l=(s||'').toLowerCase();return l.includes('won')?'b-won':l.includes('lost')?'b-lost':l.includes('negot')||l.includes('close')?'b-neg':l.includes('qual')?'b-qual':l.includes('disc')?'b-disc':l.includes('demo')?'b-demo':'b-init'}
function mc(p){return p>=70?'var(--g)':p>=40?'var(--y)':'var(--r)'}
function pc(p){return p>=.5?'var(--g)':p>=.3?'var(--y)':'var(--r)'}

function dh(a){
  var mp=a.meddpicc.percentage||0,dc=a.discovery_completeness.percentage||0;
  var hr=a.risks.filter(r=>r.level==='high').length,mr=a.risks.filter(r=>r.level==='medium').length;
  var rs=Math.max(0,100-(hr*20+mr*8)),pr=Math.round((a.probability||0)*100);
  var s=Math.round(mp*.35+dc*.25+rs*.25+pr*.15);
  return{score:s,label:s>=70?'Healthy':s>=45?'At Risk':'Critical',cls:s>=70?'green':s>=45?'yellow':'red'};
}

function parseRole(r){
  var s=(r||'').toLowerCase();
  if(s.includes('champion'))return'champion';
  if(s.includes('economic')||s.includes('cfo')||s.includes('ceo')||s.includes('vp')||s.includes('budget'))return'economic';
  if(s.includes('block')||s.includes('oppos')||s.includes('detract'))return'blocker';
  return'default';
}

async function init(){
  try{
    var r=await fetch('/api/accounts');D=await r.json();REG=D.skill_registry||{};Q=D.queue||null;

// ── Background auto-refresh (60s) — keeps D fresh without user action ─────
function startAutoRefresh(){
  setInterval(async function(){
    if(_qp)return; // poll already handling refresh
    try{
      var r=await fetch('/api/accounts');var fresh=await r.json();
      D=fresh;REG=D.skill_registry||{};
      document.getElementById('lastRef').textContent=new Date().toLocaleTimeString();
      if(cur){var a=D.accounts.find(x=>x.id===cur.id);if(a){cur=a;renderReport(a);}}
      renderSb();renderDash();
    }catch(e){}
  },60000);
}

// ── Open account ──────────────────────────────────────────────────
async function openAcct(id){
  // Show immediately with cached data, then refresh from server
  var a=D.accounts.find(x=>x.id===id);if(!a)return;
  cur=a;_tab='overview';
  document.getElementById('dash').style.display='none';
  document.getElementById('detail').style.display='block';
  document.getElementById('mainArea').scrollTop=0;
  document.querySelectorAll('.sli').forEach(el=>el.classList.toggle('active',el.getAttribute('onclick')==="openAcct('"+id+"')"));
  renderReport(a);
  // Re-fetch all account data to get latest skill outputs for this account
  try{
    var r=await fetch('/api/accounts');var fresh=await r.json();
    D=fresh;REG=D.skill_registry||{};
    document.getElementById('lastRef').textContent=new Date().toLocaleTimeString();
    var fa=D.accounts.find(x=>x.id===id);
    if(fa&&cur&&cur.id===id){cur=fa;renderReport(fa);renderSb();}
  }catch(e){}
}

  cur=null;
  document.getElementById('dash').style.display='block';

  document.querySelectorAll('.sli').forEach(el=>el.classList.remove('active'));
}

  p+='</div>';

  // ── RISK ──────────────────────────────────────────────────────
  p+='<div class="tp'+(_tab==='risk'?' on':'')+'" id="tp-risk">';
  p+='<div class="cols">';
  p+='<div class="sec"><div class="sec-h">Deal Risks <span style="color:'+(hrCnt?'var(--r)':'var(--g)')+'">'+a.risks.length+' found'+(hrCnt?' · '+hrCnt+' HIGH':'')+'</span></div><div class="sec-b">';
  if(a.risks.length)p+=a.risks.map(r=>'<div class="ri '+r.level+'"><span class="rb '+r.level+'">'+esc(r.level)+'</span><div><strong>'+esc(r.cat)+'</strong> — '+esc(r.text)+'</div></div>').join('');
  else p+='<div style="color:var(--g);font-size:12px">No significant risks identified</div>';
  p+='</div></div>';
  p+='<div class="sec"><div class="sec-h">Discovery <span style="color:'+(dc.percentage>=70?'var(--g)':dc.percentage>=40?'var(--y)':'var(--r)')+'">'+dc.percentage+'%</span></div><div class="sec-b">';
  p+='<div class="dp">'+Array.from({length:dc.total},(_,i)=>'<div class="ds '+(i<dc.completed?'ok':'')+'"></div>').join('')+'</div>';
  p+='<div style="font-size:11px;color:var(--t2);margin-bottom:8px">'+dc.completed+'/'+dc.total+' areas covered</div>';
  if(dc.missing&&dc.missing.length){
    p+='<div class="lbl" style="color:var(--r)">Gaps</div>';
    p+=dc.missing.map(m=>'<div style="font-size:11px;padding:2px 0;color:var(--y)">&cir; '+esc(m)+'</div>').join('');
  }
  p+='</div></div>';
  p+='</div>'; // cols
  if(so.risk_report)p+=coll('AI Risk Report',so.risk_report);
  if(so.technical_risk)p+=coll('Technical Risk',so.technical_risk);
  if(so.discovery_questions||a.discovery_notes)p+=coll('Discovery Notes & Questions',so.discovery_questions||a.discovery_notes||'');
  p+='</div>';

  // ── EXECUTE ───────────────────────────────────────────────────
  p+='<div class="tp'+(_tab==='execute'?' on':'')+'" id="tp-execute">';
  p+='<div class="cols" style="margin-bottom:12px">';
  p+='<div class="sec"><div class="sec-h">Company Research</div><div class="sec-b"><div class="md-body">'+md(a.company_info||'')+'</div>'+((!a.company_info)?'<span class="empty">No company research generated yet</span>':'')+'</div></div>';
  p+='<div class="sec"><div class="sec-h">Recent Activities <span style="color:var(--t2);font-weight:400;font-size:11px">'+a.activities.length+'</span></div><div class="sec-b">';
  if(a.activities.length)p+=a.activities.slice(0,8).map(x=>'<div style="padding:6px 0;border-bottom:1px solid var(--bdr);display:flex;gap:8px;font-size:12px"><span style="color:var(--g)">✓</span><div>'+esc(x)+'</div></div>').join('');
  else p+='<span class="empty">No activities recorded</span>';
  p+='</div></div>';
  p+='</div>'; // cols
  if(so.meeting_prep)p+=coll('Meeting Prep',so.meeting_prep);
  if(so.demo_strategy)p+=coll('Demo Strategy',so.demo_strategy);
  if(so.value_architecture)p+=coll('Value Architecture & ROI',so.value_architecture);
  if(so.proposal)p+=coll('Proposal',so.proposal);
  if(so.followup_email)p+=coll('Follow-up Emails',so.followup_email);
  if(so.sow)p+=coll('Statement of Work',so.sow);

  var shown=new Set(['meddpicc','risk_report','technical_risk','competitive_intelligence','battlecard','competitor_pricing','value_architecture','discovery_questions','meeting_prep','account_summary','quick_insights','demo_strategy','proposal','followup_email','sow','intelligence_brief']);
  var pend=['account_summary','quick_insights','value_architecture','competitor_pricing','meeting_prep','demo_strategy','proposal','followup_email','technical_risk','sow','meddpicc','risk_report','battlecard','competitive_intelligence'].filter(k=>!so[k]);
  if(pend.length){
    p+='<div style="margin-top:14px"><div class="lbl">Pending Intelligence ('+pend.length+')</div><div class="pgrid">';
    var isA=Q&&Q.is_active,q=a.skills_queued||[];
    pend.forEach(function(k){
      var info=REG[k]||{label:k,cmd:k},inQ=q.indexOf(k)>=0||isA;
      p+='<div class="pk"><div class="pkl">'+esc(info.label||k)+'</div>';
      if(inQ)p+='<div style="color:var(--y);font-size:11px;font-weight:600;margin-top:4px">⏳ Generating…</div>';
      else p+='<div class="pkd">Auto-generates when active</div><div class="se-cmd" onclick="copyCmd(this)">'+esc(info.cmd||k)+' for '+esc(a.name)+'</div>';
      p+='</div>';
    });
    p+='</div></div>';
  }
  p+='</div>';

  document.getElementById('panels').innerHTML=p;
}

// ── Mini helpers ──────────────────────────────────────────────────
function hg(l,pct,col,label){
  return'<div class="hg"><div class="hgl">'+l+'</div><div class="hgbar"><div class="hgf" style="width:'+pct+'%;background:'+col+'"></div></div><div class="hgv" style="color:'+col+'">'+(label||pct+'%')+'</div></div>';
}
function ci(l,v){return'<div class="ci"><div class="cl">'+l+'</div><div class="cv">'+v+'</div></div>'}

// ── Queue ─────────────────────────────────────────────────────────
function updateQ(){
  if(!Q)return;
  var b=document.getElementById('qBadge');if(!b)return;
  if(Q.pending+Q.processing>0){b.style.display='inline-flex';b.className='q-badge active';b.textContent='⏳ '+Q.pending+' generating…';}
  else if(Q.done>0&&Q.pending===0&&Q.processing===0){b.style.display='inline-flex';b.className='q-badge done';b.textContent='✓ Up to date';setTimeout(()=>b.style.display='none',4000);}
  else b.style.display='none';
}

function startPoll(){
  if(_qp)return;
  _qp=setInterval(async function(){
    try{
      var r=await fetch('/api/queue');Q=await r.json();updateQ();
      if(!Q.is_active){
        clearInterval(_qp);_qp=null;
        var r2=await fetch('/api/accounts');D=await r2.json();REG=D.skill_registry||{};
        document.getElementById('lastRef').textContent=new Date().toLocaleTimeString();
        if(cur){var a=D.accounts.find(x=>x.id===cur.id);if(a){cur=a;renderReport(a);}}
        renderDash();renderSb();
      }
    }catch(e){}
  },5000);
}

async function generateAll(){
  try{
    var r=await fetch('/api/generate/all',{method:'POST'});var d=await r.json();
    if(d.count>0){Q={is_active:true,pending:d.count,processing:0,done:0,failed:0};updateQ();startPoll();toast('⚡ Queued '+d.count+' jobs');}
    else toast('✓ All intelligence up to date');
  }catch(e){toast('❌ Could not reach CRM server')}
}

function toast(msg){
  var t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:24px;right:24px;background:var(--s2);border:1px solid var(--bdr);color:var(--t1);padding:10px 18px;border-radius:10px;font-size:12px;font-weight:500;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.4)';
  t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3500);
}

function copyCmd(el){
  navigator.clipboard.writeText(el.textContent.trim()).catch(()=>{});
  var o=el.textContent;el.textContent='Copied!';el.style.color='var(--g)';
  setTimeout(()=>{el.textContent=o;el.style.color=''},1200);
}

window.addEventListener('load',init);
</script>
</body>
</html>

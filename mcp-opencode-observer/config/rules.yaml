# Autonomous Update Rules for OpenCode MCP Observer
# First 50 changes require approval; after that fully autonomous

approval_mode: true
max_approvals_before_autonomous: 50

# Persona detection triggers
triggers:
  - id: persona_yellow_ai
    pattern: '(?i)yellow\.ai|conversational ai|bot studio|agent assist'
    source: "message"
    action: "switch_persona account_executive"
    confidence: 0.8
    priority: 10
    
  - id: persona_technical
    pattern: '(?i)demo|architecture|integration|api|technical|solution consultant|presales'
    source: "message"
    action: "switch_persona solution_consultant"
    confidence: 0.7
    priority: 9

# Preference extraction
  - id: interest_ai_releases
    pattern: 'love.*(new.*ai|openai|claude|gpt|llm|anthropic)'
    source: "message"
    action: "update_patterns technical.interests push_unique $1"
    confidence: 0.6
    
  - id: dislike_bs
    pattern: '(?i)no (bs|bullshit)|zero tolerance|ruthless'
    source: "message"
    action: "update_personality time_sensitivity zero_tolerance_bullshit"
    confidence: 0.9
    
  - id: ownership_trait
    pattern: '(?i)complete ownership|full ownership|own the task'
    source: "message"
    action: "update_personality task_ownership full_ownership"
    confidence: 0.8

# Competitor tracking (for battlecards)
  - id: detect_competitor
    pattern: '(?i)(zendesk|salesforce|servicenow|hubspot|ACME|intercom|zoho|ibm watson|google dialogflow|microsoft bot framework|uipath|automation anywhere)'
    source: "message"
    action: "log_competitor_mention $1"
    confidence: 0.9

# Session archiving
  - id: archive_hourly
    event: "timer"
    interval: 3600000  # 60 minutes
    action: "archive_session"
    
  - id: archive_session_end
    event: "message"
    pattern: "(?i)(session ended|closing|goodbye|that's all)"
    source: "message"
    action: "archive_session immediate:true"
    confidence: 0.5

# File change backups
  - id: backup_skill_edit
    event: "file_modified"
    pattern: "persona/.*/.*\\.md"
    action: "backup_file keep_versions:10"
    
  - id: backup_memory_edit
    event: "file_modified"
    pattern: "MEMORY/.*\\.json"
    action: "backup_file keep_versions:20"

# Auto-skill enhancement suggestions (logged, not auto-applied)
  - id: suggest_skill_update
    event: "pattern"
    condition: "competitor_mentioned_count > 3 in week"
    action: "suggest_skill_update type:battlecard"
    confidence: 0.7

# Actions definition (what each action type does)
actions:
  switch_persona:
    description: "Change active persona in active_persona.json"
    exec: "personaSwitcher.switch"
    
  update_patterns:
    description: "Update persona-specific pattern JSON"
    exec: "patternUpdater.update"
    
  update_personality:
    description: "Update personality traits in patterns"
    exec: "patternUpdater.updatePersonality"
    
  log_competitor_mention:
    description: "Record competitor for battlecard updates"
    exec: "competitorTracker.log"
    
  archive_session:
    description: "Archive current session to date-based folders"
    exec: "archiveManager.archive"
    
  backup_file:
    description: "Create timestamped backup before modification"
    exec: "safetyManager.backupFile"
    
  suggest_skill_update:
    description: "Propose enhancement to persona skills"
    exec: "skillEnhancer.suggest"

# Safety limits
safety:
  max_updates_per_minute: 10
  cooldown_after_error_seconds: 300
  allowed_paths:
    - "MEMORY/**"
    - "persona/**"
  forbidden_paths:
    - "Presales Skills/*"  # Don't auto-modify presales skills
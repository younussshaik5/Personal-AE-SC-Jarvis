# JARVIS v2 Configuration — Auto-generated by setup.sh
# Re-run setup.sh to regenerate, or edit manually.

# Paths (resolved for this machine)
workspace_root: "/Users/syounus/JARVIS"
data_dir: "/Users/syounus/JARVIS/data"
logs_dir: "/Users/syounus/JARVIS/logs"
temp_dir: "/Users/syounus/JARVIS/data/cache"

# Claude workspace — set by setup.sh or .env
claude_space: "/Users/syounus/Documents/claude space"

# Identity
identity:
  name: "YOUR_NAME"
  initials: "XY"
  title: "Account Executive + Solution Consultant"
  role: "Sales & Presales"
  company: "Your Company"

# NVIDIA LLM Models — each model used for its specific expertise
# All run concurrently via the async worker pool (3 parallel workers)
# All use the same NVIDIA API endpoint and key
llm_models:
  # General text reasoning — primary workhorse for most tasks
  text:
    model: "step/step-3-5-flash"
    temperature: 0.7
    max_tokens: 8192
    context_window: 128000

  # Long-context — Nemotron 3 Super 120B (1M token window)
  # Used for: full account dossiers, large RFPs, long transcripts, cross-deal analysis
  long_context:
    model: "nvidia/nemotron-3-super-120b"
    temperature: 0.3
    max_tokens: 32768
    context_window: 1048576

  # Video/slide analysis — NVIDIA Cosmos multimodal
  video:
    model: "nvidia/cosmos-reason2-8b"
    temperature: 0.3
    max_tokens: 4096
    context_window: 8192

  # Audio transcription — Whisper large v3
  audio:
    model: "nvidia/whisper-large-v3-turbo"
    temperature: 0.0
    max_tokens: 4096

  # Code/technical analysis
  code:
    model: "nvidia/qwen2.5-coder-32b-instruct"
    temperature: 0.2
    max_tokens: 8192
    context_window: 32768

  # Lightweight/quick tasks — classification, tagging, short summaries
  quick:
    model: "nvidia/mistral-nemo-minitron-8b-8k-instruct"
    temperature: 0.5
    max_tokens: 2048
    context_window: 8192

  # Deep reasoning — complex deal strategy, competitive analysis
  reasoning:
    model: "step/step-3-5-flash"
    temperature: 0.4
    max_tokens: 8192
    context_window: 128000

llm_nvidia_base_url: "https://integrate.api.nvidia.com/v1"

# Fallback LLM - Claude (only for user-facing requests when NVIDIA fails)
llm_fallback:
  provider: "anthropic"
  api_key: "${ANTHROPIC_API_KEY}"
  model: "claude-sonnet-4-20250514"
  temperature: 0.7
  max_tokens: 8192

# Meeting processing
meeting:
  recording_dir: "/Users/syounus/JARVIS/recordings"
  frame_interval_seconds: 30
  max_recording_minutes: 120

# Playbook automation
playbook:
  stale_deal_days: 7
  critical_stale_days: 14
  auto_research_on_new_account: true
  auto_meddpicc_on_meeting: true
  auto_followup_draft: true

# Orchestrator
orchestrator:
  health_check_interval: 30
  component_restart_threshold: 5
  cycle_interval: 60

# Notifications
notifications:
  telegram_enabled: false
  desktop_enabled: true

# Safety
safety:
  enabled: true
  max_actions_per_minute: 10

# OpenCode integration
opencode_db_path: "/Users/syounus/.local/share/opencode/opencode.db"
killswitch_path: "/Users/syounus/JARVIS/data/.killswitch"

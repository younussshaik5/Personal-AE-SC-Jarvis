# JARVIS v2 - Personal AE + SC Sales Assistant
# All paths are resolved at runtime from JARVIS_HOME env var or defaults

workspace_root: ~/Documents/claude space/JARVIS
data_dir: ~/Documents/claude space/JARVIS/data
logs_dir: ~/Documents/claude space/JARVIS/logs
approval_required: true
approval_threshold: 50

evolution:
  enabled: true
  cycle_interval_hours: 6
archiving:
  enabled: true
  daily_snapshot: true
  retention_days: 90
persona:
  default: work
  auto_switch: true

# Professional Identity
identity:
  name: "Younus Shaik"
  initials: "YS"
  title: "Account Executive + Solution Consultant"
  role: "Both"
  company: "Yellow.ai"

# PRIMARY LLM: NVIDIA (used for ALL background processing - 24/7)
# Uses OpenAI-compatible endpoint at integrate.api.nvidia.com
llm:
  provider: "openai"
  api_key: ""  # Set via NVIDIA_API_KEY env var
  base_url: "https://integrate.api.nvidia.com/v1"
  model: "nvidia/llama-3.3-nemotron-super-49b-v1"
  temperature: 0.7
  top_p: 0.9
  max_tokens: 8192
  context_window: 32768
  extra_body: null
  stream: false

# VIDEO/IMAGE LLM: NVIDIA Cosmos Reason 2 (for meeting slide analysis)
llm_video:
  provider: "openai"
  api_key: ""  # Set via NVIDIA_API_KEY env var
  base_url: "https://integrate.api.nvidia.com/v1"
  model: "nvidia/cosmos-reason2-8b"
  max_tokens: 4096

# FALLBACK LLM: Claude (used ONLY when user explicitly requests via Claude Desktop)
llm_fallback:
  provider: "anthropic"
  api_key: ""  # Set via ANTHROPIC_API_KEY env var
  model: "claude-sonnet-4-20250514"
  max_tokens: 8192

# Meeting processing
meeting:
  recordings_dir: ~/Documents/claude space/JARVIS/recordings
  queue_dir: ~/Documents/claude space/JARVIS/data/meeting_queue
  auto_record: false
  frame_interval_seconds: 30

# Playbook automation
playbook:
  stale_deal_days: 7
  critical_stale_days: 14
  auto_advance: false  # Require manual stage advancement for safety

# Web search (for competitive intel)
web_search:
  enabled: true
  engine: "duckduckgo"
  max_results: 5
  timeout: 10

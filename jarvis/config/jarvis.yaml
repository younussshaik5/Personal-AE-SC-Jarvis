# JARVIS v2 Configuration — Auto-generated by setup.sh
# Re-run setup.sh to regenerate, or edit manually.

# Paths (resolved for this machine)
workspace_root: "/private/tmp/test-jarvis"
data_dir: "/private/tmp/test-jarvis/data"
logs_dir: "/private/tmp/test-jarvis/logs"
temp_dir: "/private/tmp/test-jarvis/data/cache"

# Claude workspace — set by setup.sh or .env
claude_space: "/tmp/test-workspace"

# Identity
identity:
  name: "YOUR_NAME"
  initials: "XY"
  title: "Account Executive + Solution Consultant"
  role: "Sales & Presales"
  company: "Your Company"

# Primary LLM - NVIDIA (used for ALL background processing)
llm:
  provider: "openai"
  api_key: "${NVIDIA_API_KEY}"
  base_url: "https://integrate.api.nvidia.com/v1"
  model: "nvidia/llama-3.3-nemotron-super-49b-v1"
  temperature: 0.7
  max_tokens: 8192
  context_window: 32768

# Video Analysis LLM - NVIDIA Cosmos
llm_video:
  provider: "openai"
  api_key: "${NVIDIA_API_KEY}"
  base_url: "https://integrate.api.nvidia.com/v1"
  model: "nvidia/cosmos-reason2-8b"
  temperature: 0.3
  max_tokens: 4096

# Fallback LLM - Claude (only for user-facing requests when NVIDIA fails)
llm_fallback:
  provider: "anthropic"
  api_key: "${ANTHROPIC_API_KEY}"
  model: "claude-sonnet-4-20250514"
  temperature: 0.7
  max_tokens: 8192

# Meeting processing
meeting:
  recording_dir: "/private/tmp/test-jarvis/recordings"
  frame_interval_seconds: 30
  max_recording_minutes: 120

# Playbook automation
playbook:
  stale_deal_days: 7
  critical_stale_days: 14
  auto_research_on_new_account: true
  auto_meddpicc_on_meeting: true
  auto_followup_draft: true

# Orchestrator
orchestrator:
  health_check_interval: 30
  component_restart_threshold: 5
  cycle_interval: 60

# Notifications
notifications:
  telegram_enabled: false
  desktop_enabled: true

# Safety
safety:
  enabled: true
  max_actions_per_minute: 10

# OpenCode integration
opencode_db_path: "/Users/syounus/.local/share/opencode/opencode.db"
killswitch_path: "/private/tmp/test-jarvis/data/.killswitch"

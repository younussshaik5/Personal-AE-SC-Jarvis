workspace_root: /path/to/your/workspace
data_dir: /path/to/your/workspace/jarvis/data
logs_dir: /path/to/your/workspace/jarvis/logs
approval_required: true
approval_threshold: 50
evolution:
  enabled: true
  cycle_interval_hours: 6
archiving:
  enabled: true
  daily_snapshot: true
  retention_days: 90
persona:
  default: work
  auto_switch: true

# Professional Identity (persisted throughout system)
identity:
  name: "YOUR_NAME"
  initials: "XY"
  title: "Professional at Company"
  role: "Sales & Presales" # Options: Sales, Presales, Both

llm:
  provider: "openai"  # (ignored if opencode_ai: true) openai, anthropic, nvidia, local, mock
  api_key: "YOUR_API_KEY_HERE"
  base_url: "https://api.openai.com/v1"
  model: "stepfun-ai/step-3.5-flash"
  temperature: 1
  top_p: 0.9
  max_tokens: 16384
  context_window: 32768
  extra_body: null
  stream: false

# Use OpenCode/Claude AI configuration instead of local LLM config
opencode_ai:
  enabled: true  # Set to true to use OpenCode or Claude configured AI provider/model
  config_path: "~/.config/opencode/config.yaml"  # Path to OpenCode's config file
  # Recommended: remove or comment out local llm: section above when enabled

web_search:
  enabled: true
  engine: "duckduckgo"  # duckduckgo, google (requires API key)
  max_results: 5
  timeout: 10  # seconds

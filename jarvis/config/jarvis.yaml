# JARVIS v2 Configuration — Auto-generated by setup.sh
# Re-run setup.sh to regenerate, or edit manually.

# Paths (resolved for this machine)
workspace_root: "/Users/syounus/JARVIS"
data_dir: "/Users/syounus/JARVIS/data"
logs_dir: "/Users/syounus/JARVIS/logs"
temp_dir: "/Users/syounus/JARVIS/data/cache"

# Claude workspace — set by setup.sh or .env
claude_space: "/Users/syounus/Documents/claude space"

# Identity
identity:
  name: "YOUR_NAME"
  initials: "XY"
  title: "Account Executive + Solution Consultant"
  role: "Sales & Presales"
  company: "Your Company"

# NVIDIA LLM Models — each model used for its specific expertise
# All run concurrently via the async worker pool (3 parallel workers)
# All use the same NVIDIA API endpoint and key
llm_models:
  # General text reasoning — Step 3.5 Flash (196B/11B active MoE, 256K context)
  # Used for: discovery prep, next steps email drafts, general text tasks
  text:
    model: "stepfun-ai/step-3-5-flash"
    temperature: 0.7
    max_tokens: 8192
    context_window: 131072

  # Long-context — Nemotron 3 Super 120B (1M token native window, GTC March 2026)
  # Used for: full account dossiers, large RFPs, long transcripts, value architecture
  long_context:
    model: "nvidia/nemotron-3-super-120b-a12b"
    temperature: 0.3
    max_tokens: 32768
    context_window: 1048576

  # Video/slide analysis — NVIDIA Cosmos multimodal
  video:
    model: "nvidia/cosmos-reason2-8b"
    temperature: 0.3
    max_tokens: 4096
    context_window: 8192

  # Audio transcription — Parakeet CTC 1.1B via NVIDIA ASR endpoint
  audio:
    model: "nvidia/parakeet-ctc-1.1b-asr"
    temperature: 0.0
    max_tokens: 4096

  # Code/technical analysis
  code:
    model: "nvidia/qwen2.5-coder-32b-instruct"
    temperature: 0.2
    max_tokens: 8192
    context_window: 32768

  # Lightweight/quick tasks — classification, tagging, short summaries
  quick:
    model: "nvidia/mistral-nemo-minitron-8b-8k-instruct"
    temperature: 0.5
    max_tokens: 2048
    context_window: 8192

  # Deep reasoning — battlecard, demo strategy, competitive analysis
  # Step 3.5 Flash: 196B/11B active MoE, multi-step structured reasoning
  reasoning:
    model: "stepfun-ai/step-3-5-flash"
    temperature: 0.4
    max_tokens: 8192
    context_window: 131072

llm_nvidia_base_url: "https://integrate.api.nvidia.com/v1"

# Fallback LLM - Claude (only for user-facing requests when NVIDIA fails)
llm_fallback:
  provider: "anthropic"
  api_key: "${ANTHROPIC_API_KEY}"
  model: "claude-sonnet-4-20250514"
  temperature: 0.7
  max_tokens: 8192

# Meeting processing
meeting:
  recording_dir: "/Users/syounus/JARVIS/recordings"
  frame_interval_seconds: 30
  max_recording_minutes: 240
  # Concurrency — 1 recording at a time to avoid OOM on large files
  max_concurrent_recordings: 1
  # Transcription model override (must match NVIDIA ASR endpoint)
  transcription_model: "nvidia/parakeet-ctc-1.1b-asr"
  # Audio chunking — files >25 MB are split into chunks
  chunk_duration_seconds: 600
  chunk_overlap_seconds: 30
  # Parallel API calls for chunk transcription and frame analysis
  max_parallel_api_calls: 5
  # Dynamic ffmpeg timeout: seconds per GB of input file
  ffmpeg_timeout_per_gb: 600
  # Auto-cleanup: delete processed recordings older than N days
  processed_retention_days: 7
  # Fast path: 1 frame every 2 minutes for quick analysis
  fast_path_frame_interval: 120
  # Deep path: 1 frame every 30 seconds for full analysis
  deep_path_frame_interval: 30

# Playbook automation
playbook:
  stale_deal_days: 7
  critical_stale_days: 14
  auto_research_on_new_account: true
  auto_meddpicc_on_meeting: true
  auto_followup_draft: true

# Orchestrator
orchestrator:
  health_check_interval: 30
  component_restart_threshold: 5
  cycle_interval: 60

# Notifications
notifications:
  telegram_enabled: false
  desktop_enabled: true

# Safety
safety:
  enabled: true
  max_actions_per_minute: 10

# OpenCode integration
opencode_db_path: "/Users/syounus/.local/share/opencode/opencode.db"
killswitch_path: "/Users/syounus/JARVIS/data/.killswitch"

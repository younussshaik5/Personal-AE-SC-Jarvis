workspace_root: "/path/to/your/workspace"
data_dir: "/path/to/your/workspace/data"
logs_dir: "/path/to/your/workspace/logs"
temp_dir: "/path/to/your/workspace/tmp"
opencode_db_path: "~/.local/share/opencode/opencode.db"
opencode_api_url: "http://localhost:4096"
mcp_server_enabled: true
mcp_transport: "stdio"
approval_required: true
approval_threshold: 50
killswitch_path: ".jarvis.killswitch"
backup_retention_days: 90
max_rollback_chain: 100
evolution_enabled: true
evolution_interval_hours: 6
max_improvements_per_cycle: 3
ab_test_duration_hours: 24
require_ab_test: true
observe_filesystem: true
observe_git: true
observe_conversations: true
observe_database: true
polling_interval_seconds: 10
archiving_enabled: true
daily_snapshot: true
weekly_full_snapshot: true
archive_compression: "gzip"
log_level: "INFO"
log_json: true
log_retention_days: 30
max_concurrent_updates: 5
embedding_cache_size: 1000
max_memory_mb: 1024
default_persona: "work"
auto_persona_switch: true
persona_trust_threshold: 0.5
